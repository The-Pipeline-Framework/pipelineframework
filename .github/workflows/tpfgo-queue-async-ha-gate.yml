name: CI — TPFGo QUEUE_ASYNC Durable HA Gate

on:
  push:
    branches:
      - main
    paths:
      - "pom.xml"
      - "mvnw"
      - "mvnw.cmd"
      - ".mvn/**"
      - "framework/**"
      - "examples/checkout/**"
      - "docs/**"
      - "scripts/ci/**"
      - ".github/workflows/e2e-checkout-ftgo-queue-async-ha.yml"
      - ".github/workflows/tpfgo-queue-async-ha-gate.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xmx2g -Xms512m
  MAVEN_ARGS_BUILD: -B -T 1 -V -Dmaven.test.redirectTestOutputToFile=true -Dsurefire.parallel=none -Dfailsafe.parallel=none

jobs:
  build-framework:
    name: Build Framework
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> $GITHUB_ENV

      - name: Install root POM, framework, and foundational plugins to local repository
        run: |
          ./scripts/ci/bootstrap-local-repo-prereqs.sh framework

      - name: Package framework artifacts
        run: |
          mkdir -p /tmp/m2-artifacts
          cd ~/.m2/repository
          dirs=()
          for d in org/pipelineframework org/pipelineframework/csv org/pipelineframework/search; do
            if [ ! -d "$d" ]; then
              echo "::error::Missing required framework artifact subtree '$d' before packaging framework-m2-cache."
              exit 1
            fi
            dirs+=("$d")
          done
          tar -czf /tmp/m2-artifacts/framework-m2-cache.tar.gz "${dirs[@]}"

      - name: Upload framework artifacts
        uses: actions/upload-artifact@v4
        with:
          name: framework-m2-cache
          path: /tmp/m2-artifacts/framework-m2-cache.tar.gz
          retention-days: 7
          if-no-files-found: error

  checkout-canonical-queue-async-ha:
    name: Checkout Canonical E2E (QUEUE_ASYNC Durable HA)
    needs: build-framework
    uses: ./.github/workflows/e2e-checkout-ftgo-queue-async-ha.yml
    with:
      artifact_name: framework-m2-cache
    secrets: inherit
