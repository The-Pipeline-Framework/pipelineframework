name: CI — CSV Self-Hosted HA

on:
  pull_request:
    branches:
      - main
    paths:
      - "framework/**"
      - "examples/csv-payments/**"
      - "scripts/ci/**"
      - "pom.xml"
      - "mvnw"
      - ".mvn/**"
      - ".github/actions/setup-testcontainers/**"
      - ".github/workflows/self-host-ha-csv.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAVEN_OPTS: -Xmx2g -Xms512m

jobs:
  csv-self-host-ha:
    name: CSV Self-Hosted HA (${{ matrix.await-transport }}, ${{ matrix.admission-profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        await-transport:
          - sqs
          - kafka
        admission-profile:
          - slow
          - burst

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Setup Docker environment
        uses: ./.github/actions/setup-testcontainers
        with:
          images: |
            localstack/localstack:3.8
            localstack/localstack:4.13
            postgres:17
            apache/kafka:3.8.0
            testcontainers/ryuk:0.13.0
            alpine:3.17

      - name: Restore CSV application images
        id: csv-application-images
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ runner.temp }}/csv-ha-${{ matrix.await-transport }}-images.tar
            examples/csv-payments/orchestrator-svc/target
          key: tpf-csv-ha-images-v2-${{ runner.os }}-${{ runner.arch }}-${{ matrix.await-transport }}-${{ hashFiles('pom.xml', 'framework/**', 'connectors/object-ingest/**', 'examples/csv-payments/**') }}

      - name: Load CSV application images
        if: ${{ steps.csv-application-images.outputs.cache-hit == 'true' }}
        run: |
          docker load --input "${{ runner.temp }}/csv-ha-${{ matrix.await-transport }}-images.tar" >/dev/null
          echo "CSV application image cache hit."

      - name: Prepare CSV application images
        if: ${{ steps.csv-application-images.outputs.cache-hit != 'true' }}
        env:
          TPF_CSV_AWAIT_TRANSPORT: ${{ matrix.await-transport }}
        run: ./examples/csv-payments/self-host/container/run-container-ha-demo.sh --prepare-images

      - name: Archive CSV application images
        if: ${{ steps.csv-application-images.outputs.cache-hit != 'true' }}
        run: |
          docker save --output "${{ runner.temp }}/csv-ha-${{ matrix.await-transport }}-images.tar" \
            localhost/csv-payments/orchestrator-svc:latest \
            localhost/csv-payments/pipeline-runtime-svc:latest \
            localhost/csv-payments/persistence-svc:latest

      - name: Save CSV application images
        if: ${{ steps.csv-application-images.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ runner.temp }}/csv-ha-${{ matrix.await-transport }}-images.tar
            examples/csv-payments/orchestrator-svc/target
          key: ${{ steps.csv-application-images.outputs['cache-primary-key'] }}

      - name: Run CSV self-host HA demo
        env:
          TPF_CSV_AWAIT_TRANSPORT: ${{ matrix.await-transport }}
          TPF_CSV_ADMISSION_PROFILE: ${{ matrix.admission-profile }}
          TPF_SKIP_CONTAINER_BUILD: "true"
          TPF_KEEP_STACK_ON_FAILURE: "true"
        run: ./examples/csv-payments/self-host/container/run-container-ha-demo.sh --ci

      - name: Dump CSV self-host logs on failure
        if: failure()
        env:
          TPF_REPO_ROOT: ${{ github.workspace }}
          TPF_CSV_AWAIT_TRANSPORT: ${{ matrix.await-transport }}
        run: |
          compose_files=(-f examples/csv-payments/self-host/container/compose.yaml)
          if [[ "${TPF_CSV_AWAIT_TRANSPORT}" == "kafka" ]]; then
            compose_files+=(-f examples/csv-payments/self-host/container/compose.kafka.yaml)
          fi
          docker compose "${compose_files[@]}" ps || true
          docker compose "${compose_files[@]}" logs --no-color --tail=500 || true
          docker compose "${compose_files[@]}" down -v --remove-orphans || true

      - name: Upload CSV self-host failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: csv-self-host-ha-${{ matrix.await-transport }}-${{ matrix.admission-profile }}
          path: |
            examples/csv-payments/self-host/container/target/tpf-container-ha/**
            examples/csv-payments/**/target/replay/**
            examples/csv-payments/self-host/container/compose*.yaml
          retention-days: 7
          if-no-files-found: warn
