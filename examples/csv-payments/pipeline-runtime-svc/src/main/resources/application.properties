quarkus.http.ssl-port=8445
quarkus.http.insecure-requests=disabled
quarkus.grpc.server.use-separate-server=false
quarkus.grpc.server.plain-text=false
# Provide absolute secret mount paths and secret-backed values in production.
quarkus.http.ssl.certificate.key-store-file=${SERVER_KEYSTORE_PATH:}
quarkus.http.ssl.certificate.key-store-password=${SERVER_KEYSTORE_PASSWORD:}
quarkus.http.ssl.certificate.trust-store-file=${SERVER_TRUSTSTORE_PATH:}
quarkus.http.ssl.certificate.trust-store-password=${SERVER_TRUSTSTORE_PASSWORD:}

# Keep generated wiring aligned to the grouped pipeline runtime topology.
pipeline.module.pipeline-runtime-svc.steps=process-csv-payments-input,\
  await-payment-provider,\
  process-approved-payment-status,\
  process-unapproved-payment-status,\
  finalize-payment-output
persistence.duplicate-key=ignore
pipeline.parallelism=${PIPELINE_PARALLELISM:PARALLEL}
pipeline.max-concurrency=${PIPELINE_MAX_CONCURRENCY:250}

# The grouped runtime host executes the Kafka await step when used as a remote
# transition worker, so it must publish await requests. The coordinator service
# owns completion admission and await-unit state.
pipeline.orchestrator.mode=${PIPELINE_ORCHESTRATOR_MODE:QUEUE_ASYNC}
pipeline.orchestrator.resume-token-secret=${PIPELINE_ORCHESTRATOR_RESUME_TOKEN_SECRET:csv-payments-local-resume-token-secret}
pipeline.orchestrator.idempotency-policy=${PIPELINE_ORCHESTRATOR_IDEMPOTENCY_POLICY:CLIENT_KEY_REQUIRED}
# CSV object ingest can run long under Kafka + observability E2E runs.
pipeline.orchestrator.lease-ms=${PIPELINE_ORCHESTRATOR_LEASE_MS:1800000}
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
tpf.await.kafka.reactive-messaging.enabled=true
mp.messaging.outgoing.tpf-await-kafka-requests.connector=smallrye-kafka
mp.messaging.outgoing.tpf-await-kafka-requests.topic=csv-payments.payment.requests
mp.messaging.outgoing.tpf-await-kafka-requests.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.csv-payment-provider-requests.connector=smallrye-kafka
mp.messaging.incoming.csv-payment-provider-requests.topic=csv-payments.payment.requests
mp.messaging.incoming.csv-payment-provider-requests.group.id=${CSV_PAYMENT_PROVIDER_REQUESTS_GROUP_ID:csv-payments-mock-provider}
mp.messaging.incoming.csv-payment-provider-requests.auto.offset.reset=${CSV_PAYMENT_PROVIDER_REQUESTS_OFFSET_RESET:earliest}
mp.messaging.incoming.csv-payment-provider-requests.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.outgoing.csv-payment-provider-results.connector=smallrye-kafka
mp.messaging.outgoing.csv-payment-provider-results.topic=csv-payments.payment.results
mp.messaging.outgoing.csv-payment-provider-results.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Rate limiting for payment provider behavior (merged service defaults).
# Conservative defaults; tune upward only after provider load validation.
csv-payments.payment-provider.permits-per-second=100.0
csv-payments.payment-provider.timeout-millis=3000

pipeline.client.tls-configuration-name=pipeline-client
quarkus.tls.pipeline-client.trust-store.jks.path=${CLIENT_TRUSTSTORE_PATH:}
quarkus.tls.pipeline-client.trust-store.jks.password=${CLIENT_TRUSTSTORE_PASSWORD:}

# Docker image
quarkus.container-image.builder=jib
quarkus.container-image.registry=${IMAGE_REGISTRY:registry.example.com}
quarkus.container-image.group=${IMAGE_GROUP:csv-payments}
quarkus.container-image.name=${IMAGE_NAME:pipeline-runtime-svc}
quarkus.container-image.tag=${IMAGE_TAG:1.0.0}
