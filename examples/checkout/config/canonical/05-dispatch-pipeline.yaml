version: 2
appName: TPFGo Dispatch Pipeline
basePackage: org.pipelineframework.tpfgo.dispatch
transport: GRPC
platform: COMPUTE
types:
  OrderReadyForDispatch:
    fields:
      - [orderId, uuid]
      - [customerId, uuid]
      - [restaurantId, uuid]
      - [totalAmount, decimal]
      - [currency, string]
      - [readyAt, timestamp]
      - [kitchenTicketId, uuid]
      - [lineageDigest, string]
  DeliveryAssigned:
    fields:
      - [orderId, uuid]
      - [customerId, uuid]
      - [restaurantId, uuid]
      - [totalAmount, decimal]
      - [currency, string]
      - [kitchenTicketId, uuid]
      - [dispatchId, uuid]
      - [courierId, uuid]
      - [etaMinutes, int32]
      - [assignedAt, timestamp]
      - [lineageDigest, string]
steps:
  - name: Dispatch Assign Courier
    service: org.pipelineframework.tpfgo.dispatch.dispatch_assign_courier.service.ProcessDispatchAssignCourierService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.OrderReadyForDispatch
    inputTypeName: OrderReadyForDispatch
    inboundMapper: org.pipelineframework.tpfgo.dispatch.dispatch_assign_courier.service.OrderReadyForDispatchMapper
    output: org.pipelineframework.tpfgo.common.domain.DeliveryAssigned
    outputTypeName: DeliveryAssigned
    outboundMapper: org.pipelineframework.tpfgo.dispatch.dispatch_assign_courier.service.DeliveryAssignedMapper
input:
  subscription:
    publication: tpfgo.kitchen.order-ready.v1
output:
  checkpoint:
    publication: tpfgo.dispatch.delivery-assigned.v1
    idempotencyKeyFields:
      - orderId
