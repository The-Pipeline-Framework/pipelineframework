version: 2
appName: TPFGo Kitchen Preparation Pipeline
basePackage: org.pipelineframework.tpfgo.kitchen.preparation
transport: GRPC
platform: COMPUTE
messages:
  OrderAcceptedByRestaurant:
    fields:
      - number: 1
        name: orderId
        type: uuid
      - number: 2
        name: requestId
        type: uuid
      - number: 3
        name: customerId
        type: uuid
      - number: 4
        name: restaurantId
        type: uuid
      - number: 5
        name: totalAmount
        type: decimal
      - number: 6
        name: currency
        type: string
      - number: 7
        name: acceptedAt
        type: timestamp
      - number: 8
        name: kitchenTicketId
        type: uuid
  KitchenTask:
    fields:
      - number: 1
        name: orderId
        type: uuid
      - number: 2
        name: customerId
        type: uuid
      - number: 3
        name: restaurantId
        type: uuid
      - number: 4
        name: totalAmount
        type: decimal
      - number: 5
        name: currency
        type: string
      - number: 6
        name: kitchenTicketId
        type: uuid
      - number: 7
        name: taskId
        type: uuid
      - number: 8
        name: taskName
        type: string
      - number: 9
        name: taskStatus
        type: string
  OrderReadyForDispatch:
    fields:
      - number: 1
        name: orderId
        type: uuid
      - number: 2
        name: customerId
        type: uuid
      - number: 3
        name: restaurantId
        type: uuid
      - number: 4
        name: totalAmount
        type: decimal
      - number: 5
        name: currency
        type: string
      - number: 6
        name: readyAt
        type: timestamp
      - number: 7
        name: kitchenTicketId
        type: uuid
      - number: 8
        name: lineageDigest
        type: string
steps:
  - name: Kitchen Expand Tasks
    service: org.pipelineframework.tpfgo.kitchen.preparation.kitchen_expand_tasks.service.ProcessKitchenExpandTasksService
    cardinality: ONE_TO_MANY
    input: org.pipelineframework.tpfgo.common.domain.OrderAcceptedByRestaurant
    inputTypeName: OrderAcceptedByRestaurant
    output: org.pipelineframework.tpfgo.common.domain.KitchenTask
    outputTypeName: KitchenTask
  - name: Kitchen Reduce Completion
    service: org.pipelineframework.tpfgo.kitchen.preparation.kitchen_reduce_completion.service.ProcessKitchenReduceCompletionService
    cardinality: MANY_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.KitchenTask
    inputTypeName: KitchenTask
    output: org.pipelineframework.tpfgo.common.domain.OrderReadyForDispatch
    outputTypeName: OrderReadyForDispatch
input:
  subscription:
    publication: tpfgo.restaurant.order-accepted.v1
output:
  checkpoint:
    publication: tpfgo.kitchen.order-ready.v1
    idempotencyKeyFields:
      - orderId
