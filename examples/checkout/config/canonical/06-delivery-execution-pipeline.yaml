version: 2
appName: TPFGo Delivery Execution Pipeline
basePackage: org.pipelineframework.tpfgo.delivery.execution
transport: GRPC
platform: COMPUTE
types:
  DeliveryAssigned:
    fields:
      - [1, orderId, uuid]
      - [2, customerId, uuid]
      - [3, restaurantId, uuid]
      - [4, totalAmount, decimal]
      - [5, currency, string]
      - [6, kitchenTicketId, uuid]
      - [7, dispatchId, uuid]
      - [8, courierId, uuid]
      - [9, etaMinutes, int32]
      - [10, assignedAt, timestamp]
      - [11, lineageDigest, string]
  OrderDelivered:
    fields:
      - [1, orderId, uuid]
      - [2, customerId, uuid]
      - [3, dispatchId, uuid]
      - [4, courierId, uuid]
      - [5, restaurantId, uuid]
      - [6, kitchenTicketId, uuid]
      - [7, deliveredAt, timestamp]
      - [8, amount, decimal]
      - [9, currency, string]
      - [10, lineageDigest, string]
steps:
  - name: Delivery Execute Order
    service: org.pipelineframework.tpfgo.delivery.execution.delivery_execute_order.service.ProcessDeliveryExecuteOrderService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.DeliveryAssigned
    inputTypeName: DeliveryAssigned
    inboundMapper: org.pipelineframework.tpfgo.delivery.execution.delivery_execute_order.service.DeliveryAssignedMapper
    output: org.pipelineframework.tpfgo.common.domain.OrderDelivered
    outputTypeName: OrderDelivered
    outboundMapper: org.pipelineframework.tpfgo.delivery.execution.delivery_execute_order.service.OrderDeliveredMapper
input:
  subscription:
    publication: tpfgo.dispatch.delivery-assigned.v1
output:
  checkpoint:
    publication: tpfgo.delivery.order-delivered.v1
    idempotencyKeyFields:
      - orderId
