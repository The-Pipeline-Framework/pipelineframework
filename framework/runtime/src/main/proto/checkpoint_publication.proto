syntax = "proto3";

package org.pipelineframework.checkpoint.grpc;

option java_multiple_files = true;
option java_package = "org.pipelineframework.checkpoint.grpc";

service CheckpointPublicationService {
  rpc Publish (CheckpointPublishRequest) returns (CheckpointPublishAcceptedResponse);
}

message CheckpointPublishRequest {
  string publication = 1;
  bytes payload_json = 2;
  string tenant_id = 3;
  string idempotency_key = 4;
}

message CheckpointPublishAcceptedResponse {
  string execution_id = 1;
  bool duplicate = 2;
  string status_url = 3;
  int64 submitted_at_epoch_ms = 4;
}
