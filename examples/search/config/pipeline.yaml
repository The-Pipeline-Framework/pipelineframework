version: 2
appName: Search Pipeline
basePackage: org.pipelineframework.search
transport: REST
platform: COMPUTE
aspects:
  persistence:
    enabled: true
    scope: GLOBAL
    position: AFTER_STEP
    order: 0
    config:
      pluginImplementationClass: org.pipelineframework.plugin.persistence.PersistenceService
  cache:
    enabled: true
    scope: GLOBAL
    position: AFTER_STEP
    order: 5
    config:
      pluginImplementationClass: org.pipelineframework.plugin.cache.CacheService
  cache-invalidate:
    enabled: true
    scope: STEPS
    position: BEFORE_STEP
    order: -4
    config:
      targetSteps:
        - ProcessTokenizeContentService
      pluginImplementationClass: org.pipelineframework.plugin.cache.CacheInvalidationService
  cache-invalidate-all:
    enabled: true
    scope: STEPS
    position: BEFORE_STEP
    order: -5
    config:
      targetSteps:
        - ProcessParseDocumentService
      pluginImplementationClass: org.pipelineframework.plugin.cache.CacheInvalidationAllService
types:
  CrawlRequest:
    fields:
      - [docId, uuid]
      - [sourceUrl, string]
      - [fetchMethod, string]
      - [accept, string]
      - [acceptLanguage, string]
      - [authScope, string]
      - name: fetchHeaders
        type: map
        keyType: string
        valueType: string
  RawDocument:
    fields:
      - [docId, uuid]
      - [sourceUrl, string]
      - [fetchOptions, string]
      - [rawContent, string]
      - [rawContentHash, string]
      - [fetchedAt, timestamp]
  ParsedDocument:
    fields:
      - [docId, uuid]
      - [title, string]
      - [content, string]
      - [contentHash, string]
      - [rawContentHash, string]
      - [extractedAt, timestamp]
  TokenBatch:
    fields:
      - [docId, uuid]
      - [batchIndex, int32]
      - [tokenCount, int32]
      - [tokens, string]
      - [tokensHash, string]
      - [contentHash, string]
      - [tokenizedAt, timestamp]
  EmbeddedChunk:
    fields:
      - [docId, uuid]
      - [batchIndex, int32]
      - [tokenCount, int32]
      - [tokens, string]
      - [tokensHash, string]
      - [contentHash, string]
      - [vectorHash, string]
      - [vectorVersion, string]
      - [embeddedAt, timestamp]
  SearchIndexDocument:
    fields:
      - [docId, uuid]
      - [externalId, string]
      - [batchIndex, int32]
      - [tokenCount, int32]
      - [tokens, string]
      - [tokensHash, string]
      - [contentHash, string]
      - [vectorHash, string]
      - [vectorVersion, string]
      - [indexName, string]
      - [preparedAt, timestamp]
  SearchIndexWriteResult:
    fields:
      - [docId, uuid]
      - [externalId, string]
      - [commandId, string]
      - [indexName, string]
      - [resultStatus, string]
      - [createdOrUpdated, bool]
      - [recordedDuplicate, bool]
      - [batchIndex, int32]
      - [tokenCount, int32]
      - [tokens, string]
      - [tokensHash, string]
      - [vectorHash, string]
      - [vectorVersion, string]
      - [indexedAt, timestamp]
  IndexAck:
    fields:
      - [docId, uuid]
      - [indexVersion, string]
      - [tokensHash, string]
      - [tokenBatchCount, int32]
      - [uniqueTokenCount, int32]
      - [topToken, string]
      - [indexedAt, timestamp]
      - [success, bool]
steps:
  - name: Crawl Source
    service: org.pipelineframework.search.crawl_source.service.ProcessCrawlSourceService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.search.common.domain.CrawlRequest
    inputTypeName: CrawlRequest
    inboundMapper: org.pipelineframework.search.common.mapper.CrawlRequestMapper
    output: org.pipelineframework.search.common.domain.RawDocument
    outputTypeName: RawDocument
    outboundMapper: org.pipelineframework.search.common.mapper.RawDocumentMapper
  - name: Parse Document
    service: org.pipelineframework.search.parse_document.service.ProcessParseDocumentService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.search.common.domain.RawDocument
    inputTypeName: RawDocument
    inboundMapper: org.pipelineframework.search.common.mapper.RawDocumentMapper
    output: org.pipelineframework.search.common.domain.ParsedDocument
    outputTypeName: ParsedDocument
    outboundMapper: org.pipelineframework.search.common.mapper.ParsedDocumentMapper
  - name: Tokenize Content
    service: org.pipelineframework.search.tokenize_content.service.ProcessTokenizeContentService
    cardinality: ONE_TO_MANY
    input: org.pipelineframework.search.common.domain.ParsedDocument
    inputTypeName: ParsedDocument
    inboundMapper: org.pipelineframework.search.common.mapper.ParsedDocumentMapper
    output: org.pipelineframework.search.common.domain.TokenBatch
    outputTypeName: TokenBatch
    outboundMapper: org.pipelineframework.search.common.mapper.TokenBatchMapper
  - name: Embed Content
    service: org.pipelineframework.search.embed_content.service.ProcessEmbedContentService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.search.common.domain.TokenBatch
    inputTypeName: TokenBatch
    inboundMapper: org.pipelineframework.search.common.mapper.TokenBatchMapper
    output: org.pipelineframework.search.common.domain.EmbeddedChunk
    outputTypeName: EmbeddedChunk
    outboundMapper: org.pipelineframework.search.common.mapper.EmbeddedChunkMapper
  - name: Build Search Index Document
    service: org.pipelineframework.search.index_document.service.ProcessBuildSearchIndexDocumentService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.search.common.domain.EmbeddedChunk
    inputTypeName: EmbeddedChunk
    inboundMapper: org.pipelineframework.search.common.mapper.EmbeddedChunkMapper
    output: org.pipelineframework.search.common.domain.SearchIndexDocument
    outputTypeName: SearchIndexDocument
    outboundMapper: org.pipelineframework.search.common.mapper.SearchIndexDocumentMapper
  - name: Write Search Index Document
    kind: command
    command: opensearch-index-document
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.search.common.domain.SearchIndexDocument
    inputTypeName: SearchIndexDocument
    output: org.pipelineframework.search.common.domain.SearchIndexWriteResult
    outputTypeName: SearchIndexWriteResult
    commandIdGenerator: org.pipelineframework.search.common.command.SearchIndexDocumentCommandIdGenerator
    duplicatePolicy: RETURN_RECORDED
  - name: Summarize Index Writes
    service: org.pipelineframework.search.index_document.service.ProcessSummarizeIndexWritesService
    cardinality: MANY_TO_ONE
    input: org.pipelineframework.search.common.domain.SearchIndexWriteResult
    inputTypeName: SearchIndexWriteResult
    inboundMapper: org.pipelineframework.search.common.mapper.SearchIndexWriteResultMapper
    output: org.pipelineframework.search.common.domain.IndexAck
    outputTypeName: IndexAck
    outboundMapper: org.pipelineframework.search.common.mapper.IndexAckMapper
