name: CI — E2E Test Matrix

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MAVEN_OPTS: -Xmx1g -Xms512m
  MAVEN_ARGS_BUILD: -B -T 1C -V -Dmaven.test.redirectTestOutputToFile=true -Dsurefire.parallel=none -Dfailsafe.parallel=none

jobs:
  # Build and install framework once for all E2E workflows
  build-framework:
    name: Build Framework
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'maven-release-plugin') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> $GITHUB_ENV

      - name: Install root POM, framework, and foundational plugins to local repository
        run: |
          ./scripts/ci/bootstrap-local-repo-prereqs.sh framework

      - name: Package framework artifacts
        run: |
          mkdir -p /tmp/m2-artifacts
          cd ~/.m2/repository
          # Build list of existing pipelineframework directories
          dirs=()
          for d in org/pipelineframework org.pipelineframework.csv org.pipelineframework.search; do
            [ -d "$d" ] && dirs+=("$d")
          done
          # Tar them if any exist
          [ ${#dirs[@]} -gt 0 ] && tar -czf /tmp/m2-artifacts/framework-m2-cache.tar.gz "${dirs[@]}"

      - name: Upload framework artifacts
        uses: actions/upload-artifact@v4
        with:
          name: framework-m2-cache
          path: /tmp/m2-artifacts/framework-m2-cache.tar.gz
          retention-days: 7
          if-no-files-found: error

  # All E2E workflows run in parallel after framework is installed
  e2e-csv-monolith:
    name: CSV Monolith E2E
    needs: build-framework
    uses: ./.github/workflows/e2e-csv-monolith.yml
    with:
      artifact_name: framework-m2-cache
    secrets: inherit

  e2e-csv-pipeline-runtime:
    name: CSV Pipeline Runtime E2E
    needs: build-framework
    uses: ./.github/workflows/e2e-csv-pipeline-runtime.yml
    with:
      artifact_name: framework-m2-cache
    secrets: inherit

  e2e-search-lambda:
    name: Search Lambda Smoke
    needs: build-framework
    uses: ./.github/workflows/e2e-search-lambda-smoke.yml
    with:
      artifact_name: framework-m2-cache
    secrets: inherit

  e2e-search-azure-functions:
    name: Search Azure Functions Preview (Optional)
    needs: build-framework
    uses: ./.github/workflows/e2e-search-azure-functions.yml
    with:
      artifact_name: framework-m2-cache
      terraform_destroy: true
    secrets: inherit

  e2e-search-resource-it:
    name: Search Resource IT
    needs: build-framework
    uses: ./.github/workflows/e2e-search-resource-it.yml
    with:
      artifact_name: framework-m2-cache
    secrets: inherit

  e2e-search-pipeline:
    name: Search Pipeline E2E
    needs: build-framework
    uses: ./.github/workflows/e2e-search-pipeline-e2e.yml
    with:
      artifact_name: framework-m2-cache
    secrets: inherit

  e2e-checkout-tpfgo:
    name: Checkout TPFGo Smoke
    needs: build-framework
    uses: ./.github/workflows/e2e-checkout-tpfgo-smoke.yml
    with:
      artifact_name: framework-m2-cache
    secrets: inherit
