version: 2
appName: TPFGo Compensation Pipeline
basePackage: org.pipelineframework.tpfgo.compensation.failure
transport: GRPC
platform: COMPUTE
types:
  PaymentCaptured:
    fields:
      - [1, orderId, uuid]
      - [2, paymentId, uuid]
      - [3, processedAt, timestamp]
      - [4, amount, decimal]
      - [5, currency, string]
  PaymentRejected:
    fields:
      - [1, orderId, uuid]
      - [2, processedAt, timestamp]
      - [3, amount, decimal]
      - [4, currency, string]
      - [5, failureCode, string]
      - [6, failureReason, string]
  PaymentRequiresReview:
    fields:
      - [1, orderId, uuid]
      - [2, processedAt, timestamp]
      - [3, amount, decimal]
      - [4, currency, string]
      - [5, reviewReason, string]
  TerminalOrderState:
    fields:
      - [1, orderId, uuid]
      - [2, outcome, string]
      - [3, resolvedAt, timestamp]
      - [4, resolutionAction, string]
      - [5, paymentStatus, string]
      - [6, paymentId, uuid]
      - [7, failureCode, string]
unions:
  PaymentOutcome:
    variants:
      captured:
        type: PaymentCaptured
        number: 1
      rejected:
        type: PaymentRejected
        number: 2
      requiresReview:
        type: PaymentRequiresReview
        number: 3
steps:
  - name: Compensation Finalize Order
    service: org.pipelineframework.tpfgo.compensation.failure.compensation_finalize_order.service.ProcessCompensationFinalizeOrderService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.PaymentOutcome
    inputTypeName: PaymentOutcome
    output: org.pipelineframework.tpfgo.common.domain.TerminalOrderState
    outputTypeName: TerminalOrderState
    outboundMapper: org.pipelineframework.tpfgo.compensation.failure.compensation_finalize_order.service.TerminalOrderStateMapper
input:
  subscription:
    publication: tpfgo.payment.capture-result.v1
    mapper: org.pipelineframework.tpfgo.compensation.failure.compensation_finalize_order.service.PaymentOutcomeMapper
output:
  checkpoint:
    publication: tpfgo.compensation.terminal-state.v1
    idempotencyKeyFields:
      - orderId
