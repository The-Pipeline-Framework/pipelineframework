name: CI — Build (PR / Non-Main)

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'framework/**'
      - 'examples/**'
      - 'pom.xml'
      - 'mvnw'
      - '.mvn/**'
      - 'scripts/ci/**'
      - '.github/workflows/build.yml'
      - '.github/workflows/e2e-csv-monolith.yml'
      - '.github/workflows/e2e-csv-pipeline-runtime.yml'
      - '.github/workflows/e2e-checkout-ftgo-smoke.yml'
      - '.github/workflows/e2e-search-lambda-smoke.yml'

env:
  MAVEN_OPTS: -Xmx1g -Xms512m
  MAVEN_ARGS_BUILD: -B -T 1C -V -P!coverage -Dmaven.test.redirectTestOutputToFile=true -Dsurefire.parallel=none -Dfailsafe.parallel=none
  BOOTSTRAP_ARTIFACT: pr-m2-cache
  GENERIC_VERIFY_IT_PATTERN: "*IT,*ITCase,!CsvPaymentsEndToEndIT,!CsvPaymentsPipelineRuntimeEndToEndIT,!SearchPipelineEndToEndIT,!RawDocumentResourceIT,!ParsedDocumentResourceIT,!TokenBatchResourceIT,!IndexAckResourceIT"

jobs:
  bootstrap:
    name: Bootstrap Framework Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.artifact-meta.outputs.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> $GITHUB_ENV

      - name: Install root POM, framework, and foundational plugins to local repository
        run: ./scripts/ci/bootstrap-local-repo-prereqs.sh framework

      - name: Package framework artifacts
        run: |
          mkdir -p /tmp/m2-artifacts
          cd ~/.m2/repository
          dirs=()
          for d in org/pipelineframework org.pipelineframework.csv org.pipelineframework.search; do
            [ -d "$d" ] && dirs+=("$d")
          done
          [ ${#dirs[@]} -gt 0 ] && tar -czf /tmp/m2-artifacts/${{ env.BOOTSTRAP_ARTIFACT }}.tar.gz "${dirs[@]}"

      - name: Record artifact metadata
        id: artifact-meta
        run: echo "artifact_name=${{ env.BOOTSTRAP_ARTIFACT }}" >> "$GITHUB_OUTPUT"

      - name: Upload framework artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BOOTSTRAP_ARTIFACT }}
          path: /tmp/m2-artifacts/${{ env.BOOTSTRAP_ARTIFACT }}.tar.gz
          retention-days: 7
          if-no-files-found: error

  unit-tests:
    name: Build & Unit Tests
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> $GITHUB_ENV

      - name: Download framework artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.bootstrap.outputs.artifact_name }}
          path: /tmp/m2-artifacts

      - name: Extract framework artifacts
        run: |
          mkdir -p ~/.m2/repository
          tar -xzf /tmp/m2-artifacts/${{ needs.bootstrap.outputs.artifact_name }}.tar.gz -C ~/.m2/repository

      - name: Run unit tests
        run: |
          read -r -a maven_args <<< "$MAVEN_ARGS"
          ./mvnw "${maven_args[@]}" clean test \
            -DskipITs=true \
            -DskipNative=true \
            -Dquarkus.container-image.build=false

  generic-verify:
    name: Generic Verify
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> $GITHUB_ENV

      - name: Download framework artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.bootstrap.outputs.artifact_name }}
          path: /tmp/m2-artifacts

      - name: Extract framework artifacts
        run: |
          mkdir -p ~/.m2/repository
          tar -xzf /tmp/m2-artifacts/${{ needs.bootstrap.outputs.artifact_name }}.tar.gz -C ~/.m2/repository

      - name: Run generic verify
        run: |
          read -r -a maven_args <<< "$MAVEN_ARGS"
          # Dedicated E2E or topology-specific tests stay in their reusable jobs, not in generic verify.
          ./mvnw "${maven_args[@]}" clean verify \
            -DskipUnitTests=true \
            -DskipNative=true \
            "-Dit.test=${{ env.GENERIC_VERIFY_IT_PATTERN }}" \
            -Dquarkus.container-image.build=false

  e2e-csv-monolith:
    name: CSV Monolith E2E
    needs: bootstrap
    uses: ./.github/workflows/e2e-csv-monolith.yml
    with:
      artifact_name: ${{ needs.bootstrap.outputs.artifact_name }}
    secrets: inherit

  e2e-csv-pipeline-runtime:
    name: CSV Pipeline Runtime E2E
    needs: bootstrap
    uses: ./.github/workflows/e2e-csv-pipeline-runtime.yml
    with:
      artifact_name: ${{ needs.bootstrap.outputs.artifact_name }}
    secrets: inherit

  e2e-search-lambda:
    name: Search Lambda Smoke
    needs: bootstrap
    uses: ./.github/workflows/e2e-search-lambda-smoke.yml
    with:
      artifact_name: ${{ needs.bootstrap.outputs.artifact_name }}
    secrets: inherit

  e2e-checkout-ftgo:
    name: Checkout FTGo Smoke
    needs: bootstrap
    uses: ./.github/workflows/e2e-checkout-ftgo-smoke.yml
    with:
      artifact_name: ${{ needs.bootstrap.outputs.artifact_name }}
    secrets: inherit
