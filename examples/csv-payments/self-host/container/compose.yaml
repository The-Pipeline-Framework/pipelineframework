        -Dquarkus.grpc.clients.process-approved-payment-status.host=runtime
        -Dquarkus.grpc.clients.process-approved-payment-status.port=8183
        -Dquarkus.grpc.clients.process-approved-payment-status.plain-text=true
        -Dquarkus.grpc.clients.process-approved-payment-status.tls.enabled=false
        -Dquarkus.grpc.clients.process-approved-payment-status.tls-configuration-name=
