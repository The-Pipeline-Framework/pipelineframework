version: 3
appName: csv-payments
basePackage: org.pipelineframework.csv
transport: GRPC

sources:
  csv-payment-files:
    kind: object
    provider: filesystem
    location:
      root: ../input-csv-file-processing-svc/csv
      prefix: ""
    filter:
      include: ["*.csv"]
    poll:
      enabled: true
      interval: PT10S
      batchSize: 50
    identity:
      fields: [provider, container, key, etag]
    payload:
      mode: reference

input:
  from: csv-payment-files
  emits:
    type: org.pipelineframework.csv.domain.CsvPaymentsInputFile
    typeName: CsvPaymentsInputFile
    mapper: org.pipelineframework.csv.common.mapper.CsvPaymentFileObjectMapper

publish:
  csv-payment-output-files:
    kind: object
    provider: filesystem
    location:
      root: ../input-csv-file-processing-svc/csv
    naming:
      keyTemplate: "{groupKey}.out"
    payload:
      contentType: text/csv
    grouping:
      maxOpenGroups: 1

output:
  to: csv-payment-output-files
  consumes:
    type: org.pipelineframework.csv.domain.PaymentOutput
    typeName: PaymentOutput
    mapper: org.pipelineframework.csv.common.mapper.CsvPaymentOutputPublishMapper

types:
  CsvPaymentsInputFile:
    fields:
      - [filepath, path]
      - [csvFolderPath, path]
  PaymentRecord:
    fields:
      - [id, uuid]
      - [csvId, string]
      - [recipient, string]
      - [amount, decimal]
      - [currency, currency]
      - [csvPaymentsInputFilePath, path]
    mappings:
      persistence:
        type: org.pipelineframework.csv.common.domain.PaymentRecord
        mapper: org.pipelineframework.csv.common.mapper.PaymentRecordRepresentationMapper
      opencsv:
        type: org.pipelineframework.csv.common.domain.PaymentRecord
        mapper: org.pipelineframework.csv.common.mapper.PaymentRecordRepresentationMapper
  ApprovedPaymentStatus:
    fields:
      - [reference, string]
      - [status, string]
      - [message, string]
      - [fee, decimal]
      - [conversationId, uuid]
      - [statusCode, int64]
      - [paymentRecordId, uuid]
      - [paymentRecord, PaymentRecord]
  UnapprovedPaymentStatus:
    fields:
      - [reference, string]
      - [status, string]
      - [message, string]
      - [fee, decimal]
      - [conversationId, uuid]
      - [statusCode, int64]
      - [paymentRecordId, uuid]
      - [paymentRecord, PaymentRecord]
  ApprovedPaymentOutput:
    fields:
      - [csvPaymentsOutputFilename, string]
      - [csvPaymentsInputFilePath, path]
      - [csvId, string]
      - [recipient, string]
      - [amount, decimal]
      - [currency, currency]
      - [conversationId, uuid]
      - [status, int64]
      - [message, string]
      - [fee, decimal]
  UnapprovedPaymentOutput:
    fields:
      - [csvPaymentsOutputFilename, string]
      - [csvPaymentsInputFilePath, path]
      - [csvId, string]
      - [recipient, string]
      - [amount, decimal]
      - [currency, currency]
      - [conversationId, uuid]
      - [status, int64]
      - [message, string]
      - [fee, decimal]
  PaymentOutput:
    fields:
      - [csvPaymentsOutputFilename, string]
      - [csvPaymentsInputFilePath, path]
      - [csvId, string]
      - [recipient, string]
      - [amount, decimal]
      - [currency, currency]
      - [conversationId, uuid]
      - [status, int64]
      - [message, string]
      - [fee, decimal]
    mappings:
      persistence:
        type: org.pipelineframework.csv.common.domain.PaymentOutput
        mapper: org.pipelineframework.csv.common.mapper.PaymentOutputPersistenceMapper
  PaymentStatus:
    variants:
      approved: ApprovedPaymentStatus
      unapproved: UnapprovedPaymentStatus
  PaymentOutputBranch:
    variants:
      approved: ApprovedPaymentOutput
      unapproved: UnapprovedPaymentOutput

steps:
  - name: Process Csv Payments Input
    service: org.pipelineframework.csv.service.ProcessCsvPaymentsInputService
    cardinality: EXPANSION
    input: CsvPaymentsInputFile
    output: PaymentRecord
    java:
      input: org.pipelineframework.csv.domain.CsvPaymentsInputFile
      output: org.pipelineframework.csv.domain.PaymentRecord
    inboundMapper: org.pipelineframework.csv.common.mapper.V3CsvPaymentsInputFileGrpcMapper
  - name: Await Payment Provider
    kind: await
    cardinality: ONE_TO_ONE
    input: PaymentRecord
    output: PaymentStatus
    java:
      input: org.pipelineframework.csv.domain.PaymentRecord
      output: org.pipelineframework.csv.domain.PaymentStatus
    timeout: PT5M
    idempotency:
      fields: [csvId, recipient, amount, currency]
    await:
      correlation:
        strategy: signedResumeToken
      transport:
        type: kafka
        request:
          topic: csv-payments.payment.requests
          key: correlationId
        response:
          topic: csv-payments.payment.results
        consumer:
          group: csv-payments-orchestrator
  - name: Process Approved Payment Status
    service: org.pipelineframework.csv.service.ProcessApprovedPaymentStatusService
    cardinality: ONE_TO_ONE
    input: ApprovedPaymentStatus
    output: ApprovedPaymentOutput
    java:
      input: org.pipelineframework.csv.domain.ApprovedPaymentStatus
      output: org.pipelineframework.csv.domain.ApprovedPaymentOutput
  - name: Process Unapproved Payment Status
    service: org.pipelineframework.csv.service.ProcessUnapprovedPaymentStatusService
    cardinality: ONE_TO_ONE
    input: UnapprovedPaymentStatus
    output: UnapprovedPaymentOutput
    java:
      input: org.pipelineframework.csv.domain.UnapprovedPaymentStatus
      output: org.pipelineframework.csv.domain.UnapprovedPaymentOutput
  - name: Finalize Payment Output
    service: org.pipelineframework.csv.service.ProcessFinalizePaymentOutputService
    cardinality: ONE_TO_ONE
    input: PaymentOutputBranch
    output: PaymentOutput
    java:
      input: org.pipelineframework.csv.domain.PaymentOutputBranch
      output: org.pipelineframework.csv.domain.PaymentOutput
    outboundMapper: org.pipelineframework.csv.common.mapper.V3PaymentOutputGrpcMapper
    terminal: true

aspects:
  persistence:
    enabled: true
    scope: STEPS
    position: AFTER_STEP
    config:
      targetSteps: [ProcessCsvPaymentsInput, FinalizePaymentOutput]
      pluginImplementationClass: org.pipelineframework.plugin.persistence.PersistenceService
      enabledTargets: [GRPC_SERVICE, CLIENT_STEP, GRPC_SERVICE_SIDE_EFFECT_ONLY]
