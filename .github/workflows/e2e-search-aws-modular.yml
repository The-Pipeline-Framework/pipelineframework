name: Search AWS Modular Lambda E2E

on:
  workflow_dispatch:
    inputs:
      name_prefix:
        description: "Prefix for disposable AWS resources"
        required: false
        default: "search-modular"
        type: string
      terraform_destroy:
        description: "Destroy Terraform resources after the run"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-search-aws-modular
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xmx2g -Xms512m
  MAVEN_ARGS_BUILD: -B -T 1C -V -Dmaven.test.redirectTestOutputToFile=true -Dsurefire.parallel=none -Dfailsafe.parallel=none

jobs:
  search-aws-modular:
    name: Search AWS Modular Lambda E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> "$GITHUB_ENV"

      - name: Validate AWS workflow configuration
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Missing repo secret AWS_ROLE_ARN for Search AWS Modular Lambda E2E."
            exit 1
          fi
          echo "Using AWS region ${AWS_REGION}"

      - name: Configure AWS credentials (OIDC)
        id: configure_aws
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        id: setup_terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Bootstrap framework artifacts locally
        run: ./scripts/ci/bootstrap-local-repo-prereqs.sh framework

      - name: Build Search modular AWS Lambda topology
        run: ./examples/search/build-lambda-modular.sh -DskipTests -Dquarkus.container-image.build=false

      - name: Terraform Init
        id: terraform_init
        working-directory: examples/search/terraform/aws-modular
        run: terraform init

      - name: Terraform Apply
        id: terraform_apply
        working-directory: examples/search/terraform/aws-modular
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          terraform apply -auto-approve \
            -var="name_prefix=${{ inputs.name_prefix }}-${{ github.run_id }}"

      - name: Get orchestrator Function URL
        id: orchestrator_url
        working-directory: examples/search/terraform/aws-modular
        run: |
          URL="$(terraform output -raw orchestrator_function_url)"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for orchestrator health endpoint
        env:
          ORCHESTRATOR_URL: ${{ steps.orchestrator_url.outputs.url }}
        run: |
          retries=30
          for i in $(seq 1 "$retries"); do
            status="$(curl --connect-timeout 5 --max-time 10 -s -o /dev/null -w "%{http_code}" "${ORCHESTRATOR_URL}/q/health/live" || true)"
            if [ "$status" = "200" ]; then
              exit 0
            fi
            echo "Attempt $i/$retries: orchestrator not ready yet (HTTP ${status:-000})"
            sleep 10
          done
          final_response="$(mktemp)"
          final_status="$(curl --connect-timeout 5 --max-time 10 -s -o "${final_response}" -w "%{http_code}" "${ORCHESTRATOR_URL}/q/health/live" || true)"
          echo "Orchestrator health endpoint did not become ready in time (HTTP ${final_status:-000})"
          echo "Final response body:"
          cat "${final_response}" || true
          rm -f "${final_response}"
          exit 1

      - name: Run modular AWS end-to-end tests
        env:
          AWS_LAMBDA_ORCHESTRATOR_URL: ${{ steps.orchestrator_url.outputs.url }}
        run: |
          read -r -a maven_args <<< "$MAVEN_ARGS"
          ./mvnw "${maven_args[@]}" -f examples/search/pom.xml \
            -pl orchestrator-svc \
            -am \
            -DskipUnitTests=true \
            -Dfailsafe.failIfNoSpecifiedTests=false \
            -Dquarkus.container-image.build=false \
            -Dit.test=AwsLambdaModularEndToEndIT \
            verify

      - name: Terraform Destroy
        if: ${{ always() && inputs.terraform_destroy && steps.setup_terraform.outcome == 'success' && steps.terraform_init.outcome == 'success' }}
        working-directory: examples/search/terraform/aws-modular
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          terraform destroy -auto-approve \
            -var="name_prefix=${{ inputs.name_prefix }}-${{ github.run_id }}"

      - name: Dump reports on failure
        if: failure()
        run: |
          find examples/search -path "*/target/failsafe-reports/*.txt" -print -exec tail -n 200 {} \;
          find examples/search -path "*/target/failsafe-reports/*.dumpstream" -print -exec tail -n 400 {} \;
          find examples/search -path "*/target/surefire-reports/*.txt" -print -exec tail -n 200 {} \;

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: search-aws-modular-e2e-reports
          path: |
            examples/search/**/target/surefire-reports/*.txt
            examples/search/**/target/surefire-reports/*.xml
            examples/search/**/target/failsafe-reports/*.txt
            examples/search/**/target/failsafe-reports/*.xml
            examples/search/**/target/failsafe-reports/*.dumpstream
          retention-days: 7
          if-no-files-found: warn
