appName: "FTGo Delivery Execution Pipeline"
basePackage: "org.pipelineframework.checkout.ftgo.delivery"
transport: "GRPC"
steps:
  - name: "Delivery Execute"
    cardinality: "ONE_TO_ONE"
    inputTypeName: "DeliveryAssigned"
    inputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "customerId"
        type: "UUID"
        protoType: "string"
      - name: "dispatchId"
        type: "UUID"
        protoType: "string"
      - name: "courierId"
        type: "UUID"
        protoType: "string"
      - name: "etaMinutes"
        type: "Integer"
        protoType: "int32"
      - name: "assignedAt"
        type: "Instant"
        protoType: "string"
    outputTypeName: "OrderDelivered"
    outputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "customerId"
        type: "UUID"
        protoType: "string"
      - name: "dispatchId"
        type: "UUID"
        protoType: "string"
      - name: "courierId"
        type: "UUID"
        protoType: "string"
      - name: "deliveredAt"
        type: "Instant"
        protoType: "string"
