appName: "TPFGo Dispatch Pipeline"
basePackage: "org.pipelineframework.tpfgo.dispatch"
transport: "GRPC"
platform: "COMPUTE"
input:
  subscription:
    publication: "tpfgo.kitchen.order-ready.v1"
steps:
  - name: "Dispatch Assign Courier"
    service: "org.pipelineframework.tpfgo.dispatch.dispatch_assign_courier.service.ProcessDispatchAssignCourierService"
    cardinality: "ONE_TO_ONE"
    input: "org.pipelineframework.tpfgo.common.domain.OrderReadyForDispatch"
    inputTypeName: "OrderReadyForDispatch"
    inputFields:
      - { name: "orderId", type: "UUID", protoType: "string" }
      - { name: "customerId", type: "UUID", protoType: "string" }
      - { name: "restaurantId", type: "UUID", protoType: "string" }
      - { name: "totalAmount", type: "BigDecimal", protoType: "string" }
      - { name: "currency", type: "String", protoType: "string" }
      - { name: "readyAt", type: "Instant", protoType: "string" }
      - { name: "kitchenTicketId", type: "UUID", protoType: "string" }
      - { name: "lineageDigest", type: "String", protoType: "string" }
    output: "org.pipelineframework.tpfgo.common.domain.DeliveryAssigned"
    outputTypeName: "DeliveryAssigned"
    outputFields:
      - { name: "orderId", type: "UUID", protoType: "string" }
      - { name: "customerId", type: "UUID", protoType: "string" }
      - { name: "restaurantId", type: "UUID", protoType: "string" }
      - { name: "totalAmount", type: "BigDecimal", protoType: "string" }
      - { name: "currency", type: "String", protoType: "string" }
      - { name: "kitchenTicketId", type: "UUID", protoType: "string" }
      - { name: "dispatchId", type: "UUID", protoType: "string" }
      - { name: "courierId", type: "UUID", protoType: "string" }
      - { name: "etaMinutes", type: "Integer", protoType: "int32" }
      - { name: "assignedAt", type: "Instant", protoType: "string" }
      - { name: "lineageDigest", type: "String", protoType: "string" }
output:
  checkpoint:
    publication: "tpfgo.dispatch.delivery-assigned.v1"
    idempotencyKeyFields: [ "orderId" ]
