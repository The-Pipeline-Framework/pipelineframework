appName: "FTGo Dispatch Pipeline"
basePackage: "org.pipelineframework.checkout.ftgo.dispatch"
transport: "GRPC"
steps:
  - name: "Dispatch Assign Courier"
    cardinality: "ONE_TO_ONE"
    inputTypeName: "OrderReadyForDispatch"
    inputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "customerId"
        type: "UUID"
        protoType: "string"
      - name: "restaurantId"
        type: "UUID"
        protoType: "string"
      - name: "totalAmount"
        type: "BigDecimal"
        protoType: "string"
      - name: "currency"
        type: "String"
        protoType: "string"
      - name: "readyAt"
        type: "Instant"
        protoType: "string"
      - name: "kitchenTicketId"
        type: "UUID"
        protoType: "string"
      - name: "lineageDigest"
        type: "String"
        protoType: "string"
    outputTypeName: "DeliveryAssigned"
    outputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "customerId"
        type: "UUID"
        protoType: "string"
      - name: "totalAmount"
        type: "BigDecimal"
        protoType: "string"
      - name: "currency"
        type: "String"
        protoType: "string"
      - name: "dispatchId"
        type: "UUID"
        protoType: "string"
      - name: "courierId"
        type: "UUID"
        protoType: "string"
      - name: "etaMinutes"
        type: "Integer"
        protoType: "int32"
      - name: "assignedAt"
        type: "Instant"
        protoType: "string"
