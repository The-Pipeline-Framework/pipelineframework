pipeline.defaults.retry-limit=3
pipeline.defaults.retry-wait-ms=100
pipeline.defaults.recover-on-failure=false
pipeline.defaults.max-backoff=1000
pipeline.defaults.jitter=false
pipeline.health.enabled=false
pipeline.orchestrator.mode=QUEUE_ASYNC
pipeline.orchestrator.state-provider=memory
pipeline.orchestrator.dispatcher-provider=event
pipeline.orchestrator.dlq-provider=log
pipeline.orchestrator.idempotency-policy=CLIENT_KEY_REQUIRED
pipeline.orchestrator.strict-startup=true
pipeline.client.tls-configuration-name=pipeline-client
quarkus.tls.pipeline-client.trust-store.jks.path=../target/dev-certs/orchestrator-svc/client-truststore.jks
quarkus.tls.pipeline-client.trust-store.jks.password=secret
pipeline.module.monolith-svc.host=localhost
pipeline.module.monolith-svc.port=8444
pipeline.module.monolith-svc.steps=process-validate-order-request,\
  process-create-pending-approval,\
  process-await-restaurant-decision,\
  process-finalize-restaurant-decision

quarkus.http.insecure-requests=enabled
quarkus.http.ssl-port=0
quarkus.http.test-ssl-port=8443
quarkus.grpc.server.use-separate-server=false
quarkus.grpc.server.plain-text=true

quarkus.micrometer.export.prometheus.enabled=false
quarkus.micrometer.binder.http-server.enabled=false
quarkus.micrometer.binder.http-client.enabled=false
quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true
