version: 2
appName: TPFGo Checkout Pipeline
basePackage: org.pipelineframework.tpfgo.checkout
transport: GRPC
platform: COMPUTE
types:
  OrderItem:
    fields:
      - [1, sku, string]
      - [2, quantity, int32]
  PlaceOrderRequest:
    fields:
      - [1, requestId, uuid]
      - [2, customerId, uuid]
      - [3, restaurantId, uuid]
      - number: 4
        name: items
        type: OrderItem
        repeated: true
      - [5, totalAmount, decimal]
      - [6, currency, string]
  ValidatedOrderRequest:
    fields:
      - [1, requestId, uuid]
      - [2, customerId, uuid]
      - [3, restaurantId, uuid]
      - number: 4
        name: items
        type: OrderItem
        repeated: true
      - [5, totalAmount, decimal]
      - [6, currency, string]
      - [7, validatedAt, timestamp]
  OrderPending:
    fields:
      - [1, orderId, uuid]
      - [2, requestId, uuid]
      - [3, customerId, uuid]
      - [4, restaurantId, uuid]
      - [5, totalAmount, decimal]
      - [6, currency, string]
      - [7, createdAt, timestamp]
steps:
  - name: Checkout Validate Request
    service: org.pipelineframework.tpfgo.checkout.checkout_validate_request.service.ProcessCheckoutValidateRequestService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.PlaceOrderRequest
    inputTypeName: PlaceOrderRequest
    inboundMapper: org.pipelineframework.tpfgo.checkout.checkout_validate_request.service.PlaceOrderRequestMapper
    output: org.pipelineframework.tpfgo.common.domain.ValidatedOrderRequest
    outputTypeName: ValidatedOrderRequest
    outboundMapper: org.pipelineframework.tpfgo.checkout.checkout_validate_request.service.ValidatedOrderRequestMapper
  - name: Checkout Create Pending
    service: org.pipelineframework.tpfgo.checkout.checkout_create_pending.service.ProcessCheckoutCreatePendingService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.ValidatedOrderRequest
    inputTypeName: ValidatedOrderRequest
    inboundMapper: org.pipelineframework.tpfgo.checkout.checkout_validate_request.service.ValidatedOrderRequestMapper
    output: org.pipelineframework.tpfgo.common.domain.OrderPending
    outputTypeName: OrderPending
    outboundMapper: org.pipelineframework.tpfgo.checkout.checkout_create_pending.service.OrderPendingMapper
output:
  checkpoint:
    publication: tpfgo.checkout.order-pending.v1
    idempotencyKeyFields:
      - orderId
