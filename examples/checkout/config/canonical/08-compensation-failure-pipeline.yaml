version: 2
appName: TPFGo Compensation Pipeline
basePackage: org.pipelineframework.tpfgo.compensation.failure
transport: GRPC
platform: COMPUTE
messages:
  PaymentCaptured:
    fields:
      - number: 1
        name: orderId
        type: uuid
      - number: 2
        name: paymentId
        type: uuid
      - number: 3
        name: processedAt
        type: timestamp
      - number: 4
        name: amount
        type: decimal
      - number: 5
        name: currency
        type: string
  PaymentRejected:
    fields:
      - number: 1
        name: orderId
        type: uuid
      - number: 2
        name: processedAt
        type: timestamp
      - number: 3
        name: amount
        type: decimal
      - number: 4
        name: currency
        type: string
      - number: 5
        name: failureCode
        type: string
      - number: 6
        name: failureReason
        type: string
  PaymentRequiresReview:
    fields:
      - number: 1
        name: orderId
        type: uuid
      - number: 2
        name: processedAt
        type: timestamp
      - number: 3
        name: amount
        type: decimal
      - number: 4
        name: currency
        type: string
      - number: 5
        name: reviewReason
        type: string
  TerminalOrderState:
    fields:
      - number: 1
        name: orderId
        type: uuid
      - number: 2
        name: outcome
        type: string
      - number: 3
        name: resolvedAt
        type: timestamp
      - number: 4
        name: resolutionAction
        type: string
      - number: 5
        name: paymentStatus
        type: string
      - number: 6
        name: paymentId
        type: uuid
      - number: 7
        name: failureCode
        type: string
unions:
  PaymentOutcome:
    variants:
      captured:
        type: PaymentCaptured
        number: 1
      rejected:
        type: PaymentRejected
        number: 2
      requiresReview:
        type: PaymentRequiresReview
        number: 3
steps:
  - name: Compensation Finalize Order
    service: org.pipelineframework.tpfgo.compensation.failure.compensation_finalize_order.service.ProcessCompensationFinalizeOrderService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.PaymentOutcome
    inputTypeName: PaymentOutcome
    output: org.pipelineframework.tpfgo.common.domain.TerminalOrderState
    outputTypeName: TerminalOrderState
    outboundMapper: org.pipelineframework.tpfgo.compensation.failure.compensation_finalize_order.service.TerminalOrderStateMapper
input:
  subscription:
    publication: tpfgo.payment.capture-result.v1
output:
  checkpoint:
    publication: tpfgo.compensation.terminal-state.v1
    idempotencyKeyFields:
      - orderId
