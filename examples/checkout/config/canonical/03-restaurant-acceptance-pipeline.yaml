version: 2
appName: TPFGo Restaurant Acceptance Pipeline
basePackage: org.pipelineframework.tpfgo.restaurant.acceptance
transport: GRPC
platform: COMPUTE
types:
  OrderApproved:
    fields:
      - [1, orderId, uuid]
      - [2, requestId, uuid]
      - [3, customerId, uuid]
      - [4, restaurantId, uuid]
      - [5, totalAmount, decimal]
      - [6, currency, string]
      - [7, approvedAt, timestamp]
      - [8, riskBand, string]
  OrderAcceptedByRestaurant:
    fields:
      - [1, orderId, uuid]
      - [2, requestId, uuid]
      - [3, customerId, uuid]
      - [4, restaurantId, uuid]
      - [5, totalAmount, decimal]
      - [6, currency, string]
      - [7, acceptedAt, timestamp]
      - [8, kitchenTicketId, uuid]
steps:
  - name: Restaurant Accept Order
    service: org.pipelineframework.tpfgo.restaurant.acceptance.restaurant_accept_order.service.ProcessRestaurantAcceptOrderService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.OrderApproved
    inputTypeName: OrderApproved
    inboundMapper: org.pipelineframework.tpfgo.restaurant.acceptance.restaurant_accept_order.service.OrderApprovedMapper
    output: org.pipelineframework.tpfgo.common.domain.OrderAcceptedByRestaurant
    outputTypeName: OrderAcceptedByRestaurant
    outboundMapper: org.pipelineframework.tpfgo.restaurant.acceptance.restaurant_accept_order.service.OrderAcceptedByRestaurantMapper
  - name: Await Restaurant Acceptance
    kind: await
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.OrderAcceptedByRestaurant
    inputTypeName: OrderAcceptedByRestaurant
    output: org.pipelineframework.tpfgo.common.domain.OrderAcceptedByRestaurant
    outputTypeName: OrderAcceptedByRestaurant
    timeout: PT30M
    idempotencyKeyFields:
      - orderId
    await:
      correlation:
        strategy: interactionId
      transport:
        type: interaction-api
input:
  subscription:
    publication: tpfgo.consumer.order-approved.v1
output:
  checkpoint:
    publication: tpfgo.restaurant.order-accepted.v1
    idempotencyKeyFields:
      - orderId
