name: CI — Full Tests (Main)

on:
  push:
    branches:
      - main
    paths:
      - 'framework/**'
      - 'plugins/**'
      - 'examples/**'
      - 'mvnw'
      - '.mvn/**'
      - 'pom.xml'
      - 'scripts/ci/**'
      - '.github/workflows/full-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xmx1g -Xms512m
  MAVEN_ARGS_BUILD: -B -T 1C -V -Dmaven.test.redirectTestOutputToFile=true -Dsurefire.parallel=none -Dfailsafe.parallel=none

jobs:
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'maven-release-plugin') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> $GITHUB_ENV

      - name: Bootstrap framework and foundational plugins
        run: ./scripts/ci/bootstrap-local-repo-prereqs.sh framework

      - name: Framework clean install (JVM only)
        run: |
          read -r -a maven_args <<< "$MAVEN_ARGS"
          ./mvnw "${maven_args[@]}" -f framework/pom.xml clean install \
            -DskipNative=true \
            -Dquarkus.package.type=fast-jar \
            -Dquarkus.container-image.build=false \
            -Dquarkus.container-image.push=false

      - name: CSV payments clean install (JVM only)
        run: |
          read -r -a maven_args <<< "$MAVEN_ARGS"
          ./mvnw "${maven_args[@]}" -f examples/csv-payments/pom.xml clean install \
            -DskipNative=true \
            -Dquarkus.package.type=fast-jar \
            -Dquarkus.container-image.build=false \
            -Dquarkus.container-image.push=false

      - name: Dump test reports on failure
        if: failure()
        run: |
          echo "=== Failsafe reports ==="
          find . -path "*/target/failsafe-reports/*.txt" -print -exec tail -n 200 {} \;
          echo "=== Failsafe dumpstreams ==="
          find . -path "*/target/failsafe-reports/*.dumpstream" -print -exec tail -n 400 {} \;
          echo "=== Failsafe dumps ==="
          find . -path "*/target/failsafe-reports/*.dump" -print -exec tail -n 200 {} \;
          echo "=== Surefire reports ==="
          find . -path "*/target/surefire-reports/*.txt" -print -exec tail -n 200 {} \;

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*.txt
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.txt
            **/target/failsafe-reports/*.xml
            **/target/failsafe-reports/*.dumpstream
            **/target/failsafe-reports/*.dump
          retention-days: 7
          if-no-files-found: warn
