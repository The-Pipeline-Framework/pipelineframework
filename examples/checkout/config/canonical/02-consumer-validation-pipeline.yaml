version: 2
appName: TPFGo Consumer Validation Pipeline
basePackage: org.pipelineframework.tpfgo.consumer.validation
transport: GRPC
platform: COMPUTE
messages:
  OrderPending:
    fields:
      - number: 1
        name: orderId
        type: uuid
      - number: 2
        name: requestId
        type: uuid
      - number: 3
        name: customerId
        type: uuid
      - number: 4
        name: restaurantId
        type: uuid
      - number: 5
        name: totalAmount
        type: decimal
      - number: 6
        name: currency
        type: string
      - number: 7
        name: createdAt
        type: timestamp
  OrderApproved:
    fields:
      - number: 1
        name: orderId
        type: uuid
      - number: 2
        name: requestId
        type: uuid
      - number: 3
        name: customerId
        type: uuid
      - number: 4
        name: restaurantId
        type: uuid
      - number: 5
        name: totalAmount
        type: decimal
      - number: 6
        name: currency
        type: string
      - number: 7
        name: approvedAt
        type: timestamp
      - number: 8
        name: riskBand
        type: string
steps:
  - name: Consumer Validate Order
    service: org.pipelineframework.tpfgo.consumer.validation.consumer_validate_order.service.ProcessConsumerValidateOrderService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.OrderPending
    inputTypeName: OrderPending
    output: org.pipelineframework.tpfgo.common.domain.OrderApproved
    outputTypeName: OrderApproved
input:
  subscription:
    publication: tpfgo.checkout.order-pending.v1
output:
  checkpoint:
    publication: tpfgo.consumer.order-approved.v1
    idempotencyKeyFields:
      - orderId
