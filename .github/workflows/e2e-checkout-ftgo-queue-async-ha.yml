name: Reusable — Checkout TPFGo Checkpoint Flow

on:
  workflow_call:
    inputs:
      artifact_name:
        description: "Name of the Maven artifacts tarball"
        required: false
        default: "framework-m2-cache"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-e2e-checkout-tpfgo-checkpoint
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xmx2g -Xms512m
  MAVEN_ARGS_BUILD: -B -T 1 -V -Dmaven.test.redirectTestOutputToFile=true -Dsurefire.parallel=none -Dfailsafe.parallel=none

jobs:
  checkout-tpfgo-checkpoint:
    name: Checkout TPFGo Checkpoint Flow
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> $GITHUB_ENV

      - name: Download framework artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: /tmp/m2-artifacts

      - name: Purge stale framework artifacts from local Maven cache
        run: rm -rf ~/.m2/repository/org/pipelineframework

      - name: Extract framework artifacts
        run: |
          mkdir -p ~/.m2/repository
          mapfile -t artifacts < <(find /tmp/m2-artifacts -maxdepth 1 -type f -name '*.tar.gz' | sort)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "::error::No framework artifact tarball found under /tmp/m2-artifacts for ${{ inputs.artifact_name }}"
            exit 1
          fi
          if [ ${#artifacts[@]} -ne 1 ]; then
            printf '::error::Expected exactly one framework artifact tarball for %s but found %s: %s\n' \
              "${{ inputs.artifact_name }}" "${#artifacts[@]}" "${artifacts[*]}"
            exit 1
          fi
          artifact="${artifacts[0]}"
          if [ ! -r "$artifact" ]; then
            echo "::error::Missing or unreadable framework artifact tarball: $artifact"
            exit 1
          fi
          if ! tar -tzf "$artifact" >/dev/null; then
            echo "::error::Invalid framework artifact tarball: $artifact"
            exit 1
          fi
          tar -xzf "$artifact" -C ~/.m2/repository

      - name: Run full TPFGo checkpoint-flow suite
        run: |
          read -r -a maven_args <<< "$MAVEN_ARGS"
          ./mvnw "${maven_args[@]}" -f examples/checkout/pom.xml \
            -pl tpfgo-e2e-tests \
            -am \
            -Dtest=NoMatchingUnitTest \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -Dit.test=TpfgoCheckpointFlowIT \
            -Dfailsafe.failIfNoSpecifiedTests=false \
            verify

      - name: Dump TPFGo diagnostics on failure
        if: failure()
        run: |
          if [ -d examples/checkout/tpfgo-e2e-tests/target/failsafe-reports ]; then
            find examples/checkout/tpfgo-e2e-tests/target/failsafe-reports -maxdepth 2 -type f -print -exec tail -n 200 {} \; || true
          fi

      - name: Upload TPFGo diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkout-tpfgo-checkpoint-diagnostics
          path: |
            examples/checkout/tpfgo-e2e-tests/target/failsafe-reports/**
            examples/checkout/tpfgo-e2e-tests/target/surefire-reports/**
          retention-days: 7
          if-no-files-found: warn
