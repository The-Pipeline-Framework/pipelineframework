        -Dpipeline.orchestrator.state-provider=dynamo
        -Dpipeline.orchestrator.dispatcher-provider=sqs
        -Dpipeline.orchestrator.dlq-provider=sqs
        -Dpipeline.orchestrator.queue-url=http://localstack:4566/000000000000/tpf-work
        -Dpipeline.orchestrator.dlq-url=http://localstack:4566/000000000000/tpf-execution-dlq
        -Dpipeline.orchestrator.max-retries=3
        -Dpipeline.orchestrator.retry-delay=PT1S
        -Dpipeline.orchestrator.sqs.local-loopback=false
        -Dpipeline.orchestrator.sqs.region=${AWS_REGION:-us-east-1}
        -Dpipeline.orchestrator.sqs.endpoint-override=http://localstack:4566
        -Dpipeline.orchestrator.dynamo.region=${AWS_REGION:-us-east-1}
        -Dpipeline.orchestrator.dynamo.endpoint-override=http://localstack:4566
        -Dpipeline.orchestrator.dynamo.execution-table=tpf_execution
        -Dpipeline.orchestrator.dynamo.execution-key-table=tpf_execution_key
        -Dpipeline.orchestrator.dynamo.await-unit-table=tpf_await_unit
        -Dpipeline.orchestrator.dynamo.await-interaction-table=tpf_await_interaction
        -Dpipeline.orchestrator.dynamo.await-interaction-key-table=tpf_await_interaction_key
        -Dpipeline.orchestrator.dynamo.await-admission-table=tpf_await_admission
        -Dpipeline.orchestrator.dynamo.release-table=tpf_release_registry
        -Dpipeline.orchestrator.dynamo.worker-table=tpf_worker_registry
        -Dpipeline.orchestrator.control-plane.enabled=true
        -Dpipeline.orchestrator.control-plane.admin-token-ref=env:TPF_CONTROL_PLANE_TOKEN
        -Dpipeline.orchestrator.control-plane.require-remote-worker=true
        -Dpipeline.orchestrator.admin.enabled=true
        -Dpipeline.orchestrator.admin.admin-token-ref=env:TPF_ADMIN_TOKEN
        -Dpipeline.orchestrator.releases.registry.provider=dynamo
        -Dpipeline.orchestrator.releases.storage.provider=s3
        -Dpipeline.orchestrator.releases.storage.s3.bucket=tpf-release-artifacts
        -Dpipeline.orchestrator.releases.storage.s3.prefix=csv-payments/releases
        -Dpipeline.orchestrator.releases.storage.s3.region=${AWS_REGION:-us-east-1}
        -Dpipeline.orchestrator.releases.storage.s3.endpoint-override=http://localstack:4566
