name: CI — Restaurant Self-Hosted HA

on:
  pull_request:
    branches:
      - main
    paths:
      - "framework/**"
      - "examples/restaurant-approval/**"
      - "scripts/ci/**"
      - "pom.xml"
      - "mvnw"
      - ".mvn/**"
      - ".github/actions/setup-testcontainers/**"
      - ".github/workflows/self-host-ha-restaurant.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAVEN_OPTS: -Xmx2g -Xms512m

jobs:
  restaurant-self-host-ha:
    name: Restaurant Self-Hosted HA
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Setup Docker environment
        uses: ./.github/actions/setup-testcontainers
        with:
          images: |
            localstack/localstack:3.8
            localstack/localstack:4.13
            testcontainers/ryuk:0.13.0
            alpine:3.17

      - name: Restore restaurant application image
        id: restaurant-application-image
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ runner.temp }}/restaurant-ha-image.tar
            examples/restaurant-approval/monolith-svc/target
          key: tpf-restaurant-ha-image-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pom.xml', 'framework/**', 'connectors/object-ingest/**', 'examples/restaurant-approval/**') }}

      - name: Load restaurant application image
        if: ${{ steps.restaurant-application-image.outputs.cache-hit == 'true' }}
        run: |
          docker load --input "${{ runner.temp }}/restaurant-ha-image.tar" >/dev/null
          echo "Restaurant application image cache hit."

      - name: Prepare restaurant application image
        if: ${{ steps.restaurant-application-image.outputs.cache-hit != 'true' }}
        run: ./examples/restaurant-approval/self-host/container/run-container-ha-demo.sh --prepare-images

      - name: Archive restaurant application image
        if: ${{ steps.restaurant-application-image.outputs.cache-hit != 'true' }}
        run: docker save --output "${{ runner.temp }}/restaurant-ha-image.tar" localhost/restaurant-approval/monolith-svc:latest

      - name: Save restaurant application image
        if: ${{ steps.restaurant-application-image.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ runner.temp }}/restaurant-ha-image.tar
            examples/restaurant-approval/monolith-svc/target
          key: ${{ steps.restaurant-application-image.outputs['cache-primary-key'] }}

      - name: Run restaurant self-host HA demo
        env:
          TPF_SKIP_CONTAINER_BUILD: "true"
          TPF_KEEP_STACK_ON_FAILURE: "true"
        run: ./examples/restaurant-approval/self-host/container/run-container-ha-demo.sh --ci

      - name: Run restaurant self-host HA incident demo
        env:
          TPF_SKIP_CONTAINER_BUILD: "true"
          TPF_KEEP_STACK_ON_FAILURE: "true"
        run: ./examples/restaurant-approval/self-host/container/run-container-ha-incident.sh --ci

      - name: Run restaurant self-host HA recovery demo
        env:
          TPF_SKIP_CONTAINER_BUILD: "true"
          TPF_KEEP_STACK_ON_FAILURE: "true"
        run: ./examples/restaurant-approval/self-host/container/run-container-ha-recovery.sh --ci

      - name: Dump restaurant self-host logs on failure
        if: failure()
        env:
          TPF_REPO_ROOT: ${{ github.workspace }}
        run: |
          docker compose -f examples/restaurant-approval/self-host/container/compose.yaml ps || true
          docker compose -f examples/restaurant-approval/self-host/container/compose.yaml logs --no-color --tail=400 || true
          docker compose -f examples/restaurant-approval/self-host/container/compose.yaml down -v --remove-orphans || true
