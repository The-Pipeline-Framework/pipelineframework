appName: "FTGo Compensation and Failure Pipeline"
basePackage: "org.pipelineframework.checkout.ftgo.compensation"
transport: "GRPC"
steps:
  - name: "Failure Compensation"
    cardinality: "ONE_TO_ONE"
    inputTypeName: "PaymentFailed"
    inputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "failureCode"
        type: "String"
        protoType: "string"
      - name: "failureReason"
        type: "String"
        protoType: "string"
      - name: "failedAt"
        type: "Instant"
        protoType: "string"
    outputTypeName: "FailureTerminal"
    outputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "failureCode"
        type: "String"
        protoType: "string"
      - name: "failureReason"
        type: "String"
        protoType: "string"
      - name: "resolvedAt"
        type: "Instant"
        protoType: "string"
      - name: "resolutionAction"
        type: "String"
        protoType: "string"
