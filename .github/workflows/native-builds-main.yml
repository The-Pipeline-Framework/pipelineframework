name: CI — Native Builds (Main)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'framework/**'
      - 'plugins/**'
      - 'connectors/**'
      - 'examples/**'
      - 'mvnw'
      - '.mvn/**'
      - 'pom.xml'
      - 'scripts/ci/**'
      - '.github/workflows/native-builds-main.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xmx1g -Xms512m
  MAVEN_ARGS_BUILD: -B -T 1 -V -Dmaven.test.redirectTestOutputToFile=true

jobs:
  csv-native-builds:
    name: CSV Native Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'maven-release-plugin') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: orchestrator-svc
            artifact: native-orchestrator-svc
          - service: persistence-svc
            artifact: native-persistence-svc
          - service: input-csv-file-processing-svc
            artifact: native-input-csv-file-processing-svc
          - service: payment-status-svc
            artifact: native-payment-status-svc
          - service: payments-processing-svc
            artifact: native-payments-processing-svc
          - service: output-csv-file-processing-svc
            artifact: native-output-csv-file-processing-svc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: 21
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> $GITHUB_ENV

      - name: Bootstrap framework prerequisites
        run: |
          ./scripts/ci/bootstrap-local-repo-prereqs.sh framework

      - name: CSV native build
        run: |
          read -r -a maven_args <<< "$MAVEN_ARGS"
          ./mvnw "${maven_args[@]}" -f examples/csv-payments/pom.xml \
            -pl "${{ matrix.service }}" \
            -am \
            -DskipTests \
            -Dquarkus.container-image.build=false \
            -Dquarkus.native.enabled=true \
            -Pnative \
            clean package

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            examples/csv-payments/${{ matrix.service }}/target/*-runner
            examples/csv-payments/${{ matrix.service }}/target/*-runner.*
          retention-days: 7
          if-no-files-found: error

  search-lambda-native-smoke:
    name: Search Lambda Native Smoke
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'maven-release-plugin') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: 21
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> $GITHUB_ENV

      - name: Bootstrap framework and search prerequisites
        run: |
          ./scripts/ci/bootstrap-local-repo-prereqs.sh framework
          ./scripts/ci/bootstrap-local-repo-prereqs.sh search

      - name: Search Lambda native smoke build
        run: |
          read -r -a maven_args <<< "$MAVEN_ARGS"
          ./mvnw "${maven_args[@]}" -f examples/search/pom.xml \
            -pl crawl-source-svc \
            -am \
            -DskipTests \
            -Dtpf.build.platform=FUNCTION \
            -Dtpf.build.transport=REST \
            -Dtpf.build.rest.naming.strategy=RESOURCEFUL \
            -Dtpf.build.lambda.scope=compile \
            -Dquarkus.profile=lambda \
            -Dquarkus.container-image.build=false \
            -Dquarkus.native.enabled=true \
            -Pnative \
            package
