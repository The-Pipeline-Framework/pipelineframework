name: CI — CSV Self-Hosted HA

on:
  pull_request:
    branches:
      - main
    paths:
      - "framework/**"
      - "examples/csv-payments/**"
      - "scripts/ci/**"
      - "pom.xml"
      - "mvnw"
      - ".mvn/**"
      - ".github/actions/setup-testcontainers/**"
      - ".github/workflows/self-host-ha-csv.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAVEN_OPTS: -Xmx2g -Xms512m

jobs:
  csv-self-host-ha:
    name: CSV Self-Hosted HA (${{ matrix.await-transport }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        await-transport:
          - sqs
          - kafka

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Setup Docker environment
        uses: ./.github/actions/setup-testcontainers

      - name: Run CSV self-host HA demo
        env:
          TPF_CSV_AWAIT_TRANSPORT: ${{ matrix.await-transport }}
        run: ./examples/csv-payments/self-host/container/run-container-ha-demo.sh --ci
