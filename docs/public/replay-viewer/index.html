<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TPF Replay Viewer</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="viewer-page">
        <section class="player-panel">
          <section class="viewport" id="playerSurface">
            <div id="threeMount" class="three-mount"></div>

            <div id="playerChrome" class="player-chrome" data-visible="true">
              <div class="player-controls">
                <div class="player-controls__scrubber">
                  <input id="timelineSlider" type="range" min="0" max="1000" step="1" value="0" aria-label="Replay timeline" />
                  <div id="playbackText" class="playback-time">0.00s / 0.10s</div>
                </div>

                <div class="player-controls__bar">
                  <div class="player-controls__transport">
                    <button id="playPauseButton" class="icon-button icon-button--transport" type="button" aria-label="Play replay" title="Play replay">▶</button>
                    <button id="stopButton" class="icon-button icon-button--transport" type="button" aria-label="Stop replay" title="Stop replay">⏹</button>
                    <button id="restartButton" class="icon-button icon-button--transport" type="button" aria-label="Restart replay" title="Restart replay">↺</button>
                    <button id="stepBackButton" class="icon-button icon-button--transport" type="button" aria-label="Step to previous event" title="Step to previous event">⏮</button>
                    <button id="stepButton" class="icon-button icon-button--transport" type="button" aria-label="Step to next event" title="Step to next event">⏭</button>
                    <fieldset class="speed-group speed-group--inline" aria-label="Replay speed">
                      <label><input type="radio" name="speed" value="0.25" /> 0.25x</label>
                      <label><input type="radio" name="speed" value="0.5" checked /> 0.5x</label>
                      <label><input type="radio" name="speed" value="1" /> 1x</label>
                      <label><input type="radio" name="speed" value="2" /> 2x</label>
                      <label><input type="radio" name="speed" value="4" /> 4x</label>
                    </fieldset>
                  </div>

                  <div class="player-controls__utility">
                    <button id="sourceButton" class="icon-button" type="button" aria-haspopup="dialog" aria-controls="sourceModal" aria-label="Replay sources" title="Replay sources">☰</button>
                    <button id="infoButton" class="icon-button" type="button" aria-haspopup="dialog" aria-controls="infoModal" aria-label="Replay info" title="Replay info">ⓘ</button>
                    <button id="fullscreenButton" class="icon-button" type="button" aria-label="Full screen" title="Full screen">⛶</button>
                  </div>
                </div>

                <div id="loadProgress" class="load-progress" hidden>
                  <div class="load-progress__bar">
                    <div id="loadProgressFill" class="load-progress__fill"></div>
                  </div>
                  <div id="loadProgressText" class="load-progress__text">Loading replay...</div>
                </div>
              </div>
            </div>
          </section>

          <section class="metadata-strip" aria-label="Replay metadata">
            <div id="datasetName" class="headline">CSV Payments built-in</div>
            <div id="pipelineName" class="meta-line"></div>
            <div id="durationText" class="meta-line"></div>
            <div id="topologyText" class="meta-line"></div>
            <div id="eventCountText" class="meta-line"></div>
          </section>
        </section>
      </main>
    </div>

    <div id="sourceModal" class="info-modal" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="sourceModalTitle">
      <div class="info-modal__backdrop" data-close-modal="source"></div>
      <div class="info-modal__panel info-modal__panel--compact">
        <div class="info-modal__header">
          <h2 id="sourceModalTitle">Replay source</h2>
          <button id="sourceCloseButton" class="icon-button icon-button--close" type="button" aria-label="Close replay source" title="Close replay source">✕</button>
        </div>
        <div class="info-modal__body info-modal__body--compact">
          <label class="modal-field">
            <span>Replay source</span>
            <select id="datasetSelect" aria-label="Select replay source">
              <option value="csv-payments" selected>CSV Payments built-in</option>
              <option value="search-warm-cache">Search built-in pre-warm</option>
              <option value="search-cache-hit">Search built-in</option>
              <option value="custom">Custom replay</option>
            </select>
          </label>
          <label id="customReplayInputWrap" class="modal-field file-input" hidden aria-hidden="true">
            <span>Replay JSON file</span>
            <span class="file-input__button">Choose file</span>
            <input id="replayFileInput" type="file" accept="application/json,.json" />
          </label>
          <button id="sourceApplyButton" type="button">Load dataset</button>
        </div>
      </div>
    </div>

    <div id="infoModal" class="info-modal" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="infoModalTitle">
      <div class="info-modal__backdrop" data-close-modal="info"></div>
      <div class="info-modal__panel">
        <div class="info-modal__header">
          <h2 id="infoModalTitle">Replay info</h2>
          <button id="infoCloseButton" class="icon-button icon-button--close" type="button" aria-label="Close replay info" title="Close replay info">✕</button>
        </div>
        <div class="info-modal__body">
          <section class="info-section info-section--run-parameters">
            <h3>Run parameters</h3>
            <div id="runParametersContent" class="run-parameters"></div>
          </section>
          <section class="info-section info-section--aux">
            <div class="info-section__legend">
              <h3>Legend</h3>
              <div class="legend-list">
                <div class="legend-item"><span class="legend-swatch legend-swatch--start"></span><span>start / success transit</span></div>
                <div class="legend-item"><span class="legend-swatch legend-swatch--emit"></span><span>emit / fan-out</span></div>
                <div class="legend-item"><span class="legend-swatch legend-swatch--emit"></span><span>cache hit</span></div>
                <div class="legend-item"><span class="legend-swatch legend-swatch--retry"></span><span>retry loop</span></div>
                <div class="legend-item"><span class="legend-swatch legend-swatch--error"></span><span>error burst</span></div>
                <div class="legend-item"><span class="legend-swatch legend-swatch--branch"></span><span>DB node</span></div>
                <div class="legend-item"><span class="legend-swatch legend-swatch--branch legend-swatch--cache"></span><span>Cache node</span></div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
