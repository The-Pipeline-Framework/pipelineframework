quarkus.http.ssl-port=8443
quarkus.http.insecure-requests=disabled
quarkus.grpc.server.use-separate-server=false
quarkus.grpc.server.plain-text=false
quarkus.http.ssl.certificate.key-store-file=${SERVER_KEYSTORE_PATH:../target/dev-certs/orchestrator-svc/server-keystore.jks}
quarkus.http.ssl.certificate.key-store-password=${SERVER_KEYSTORE_PASSWORD:secret}

persistence.provider.class=org.pipelineframework.plugin.persistence.provider.VThreadPersistenceProvider
persistence.duplicate-key=ignore
quarkus.hibernate-orm.enabled=true
quarkus.hibernate-orm.blocking=true
quarkus.hibernate-orm.packages=org.pipelineframework.csv.common.domain
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${PG_JDBC_URL:jdbc:postgresql://localhost:5432/pipeline}
# Kept for compatibility when switching providers/layouts; VThread mode uses JDBC.
quarkus.datasource.reactive.url=${PG_REACTIVE_URL:${PG_URL:postgresql://localhost:5432/pipeline}}
quarkus.datasource.username=${PG_USER:postgres}
quarkus.datasource.password=${PG_PASSWORD:postgres}

pipeline.client.tls-configuration-name=pipeline-client
quarkus.tls.pipeline-client.trust-store.jks.path=${CLIENT_TRUSTSTORE_PATH:../target/dev-certs/orchestrator-svc/client-truststore.jks}
quarkus.tls.pipeline-client.trust-store.jks.password=${CLIENT_TRUSTSTORE_PASSWORD:secret}

# Keep generated wiring aligned to the single monolith runtime.
pipeline.module.monolith-svc.steps=process-csv-payments-input,\
  await-payment-provider,\
  process-payment-status
pipeline.module.monolith-svc.aspects=persistence

# Durable await/Kafka orchestration for the single-process topology.
pipeline.orchestrator.mode=${PIPELINE_ORCHESTRATOR_MODE:QUEUE_ASYNC}
pipeline.orchestrator.resume-token-secret=${PIPELINE_ORCHESTRATOR_RESUME_TOKEN_SECRET:csv-payments-local-resume-token-secret}
pipeline.orchestrator.idempotency-policy=${PIPELINE_ORCHESTRATOR_IDEMPOTENCY_POLICY:CLIENT_KEY_REQUIRED}
# CSV object ingest can run long under Kafka + observability E2E runs.
pipeline.orchestrator.lease-ms=${PIPELINE_ORCHESTRATOR_LEASE_MS:1800000}
tpf.await.kafka.reactive-messaging.enabled=true
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.outgoing.tpf-await-kafka-requests.connector=smallrye-kafka
mp.messaging.outgoing.tpf-await-kafka-requests.topic=csv-payments.payment.requests
mp.messaging.outgoing.tpf-await-kafka-requests.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.tpf-await-kafka-responses.connector=smallrye-kafka
mp.messaging.incoming.tpf-await-kafka-responses.topic=csv-payments.payment.results
mp.messaging.incoming.tpf-await-kafka-responses.group.id=${TPF_AWAIT_KAFKA_RESPONSES_GROUP_ID:csv-payments-orchestrator}
mp.messaging.incoming.tpf-await-kafka-responses.auto.offset.reset=${TPF_AWAIT_KAFKA_RESPONSES_OFFSET_RESET:earliest}
mp.messaging.incoming.tpf-await-kafka-responses.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.csv-payment-provider-requests.connector=smallrye-kafka
mp.messaging.incoming.csv-payment-provider-requests.topic=csv-payments.payment.requests
mp.messaging.incoming.csv-payment-provider-requests.group.id=${CSV_PAYMENT_PROVIDER_REQUESTS_GROUP_ID:csv-payments-mock-provider}
mp.messaging.incoming.csv-payment-provider-requests.auto.offset.reset=${CSV_PAYMENT_PROVIDER_REQUESTS_OFFSET_RESET:earliest}
mp.messaging.incoming.csv-payment-provider-requests.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.outgoing.csv-payment-provider-results.connector=smallrye-kafka
mp.messaging.outgoing.csv-payment-provider-results.topic=csv-payments.payment.results
mp.messaging.outgoing.csv-payment-provider-results.value.serializer=org.apache.kafka.common.serialization.StringSerializer
