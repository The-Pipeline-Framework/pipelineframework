appName: "FTGo Restaurant Acceptance Pipeline"
basePackage: "org.pipelineframework.checkout.ftgo.restaurant"
transport: "GRPC"
steps:
  - name: "Restaurant Accept Order"
    cardinality: "ONE_TO_ONE"
    inputTypeName: "OrderApproved"
    inputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "requestId"
        type: "UUID"
        protoType: "string"
      - name: "customerId"
        type: "UUID"
        protoType: "string"
      - name: "restaurantId"
        type: "UUID"
        protoType: "string"
      - name: "totalAmount"
        type: "BigDecimal"
        protoType: "string"
      - name: "currency"
        type: "String"
        protoType: "string"
      - name: "approvedAt"
        type: "Instant"
        protoType: "string"
      - name: "riskBand"
        type: "String"
        protoType: "string"
    outputTypeName: "OrderAcceptedByRestaurant"
    outputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "requestId"
        type: "UUID"
        protoType: "string"
      - name: "customerId"
        type: "UUID"
        protoType: "string"
      - name: "restaurantId"
        type: "UUID"
        protoType: "string"
      - name: "totalAmount"
        type: "BigDecimal"
        protoType: "string"
      - name: "currency"
        type: "String"
        protoType: "string"
      - name: "acceptedAt"
        type: "Instant"
        protoType: "string"
      - name: "kitchenTicketId"
        type: "UUID"
        protoType: "string"
