version: 2
appName: TPFGo Consumer Validation Pipeline
basePackage: org.pipelineframework.tpfgo.consumer.validation
transport: GRPC
platform: COMPUTE
types:
  OrderPending:
    fields:
      - [orderId, uuid]
      - [requestId, uuid]
      - [customerId, uuid]
      - [restaurantId, uuid]
      - [totalAmount, decimal]
      - [currency, string]
      - [createdAt, timestamp]
  OrderApproved:
    fields:
      - [orderId, uuid]
      - [requestId, uuid]
      - [customerId, uuid]
      - [restaurantId, uuid]
      - [totalAmount, decimal]
      - [currency, string]
      - [approvedAt, timestamp]
      - [riskBand, string]
steps:
  - name: Consumer Validate Order
    service: org.pipelineframework.tpfgo.consumer.validation.consumer_validate_order.service.ProcessConsumerValidateOrderService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.OrderPending
    inputTypeName: OrderPending
    inboundMapper: org.pipelineframework.tpfgo.consumer.validation.consumer_validate_order.service.OrderPendingMapper
    output: org.pipelineframework.tpfgo.common.domain.OrderApproved
    outputTypeName: OrderApproved
    outboundMapper: org.pipelineframework.tpfgo.consumer.validation.consumer_validate_order.service.OrderApprovedMapper
  - name: Await Order Approval
    kind: await
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.OrderApproved
    inputTypeName: OrderApproved
    output: org.pipelineframework.tpfgo.common.domain.OrderApproved
    outputTypeName: OrderApproved
    timeout: PT30M
    idempotencyKeyFields:
      - orderId
    await:
      correlation:
        strategy: interactionId
      transport:
        type: interaction-api
input:
  subscription:
    publication: tpfgo.checkout.order-pending.v1
output:
  checkpoint:
    publication: tpfgo.consumer.order-approved.v1
    idempotencyKeyFields:
      - orderId
