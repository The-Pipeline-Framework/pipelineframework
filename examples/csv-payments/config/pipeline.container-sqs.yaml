version: 2
appName: csv-payments
basePackage: org.pipelineframework.csv
transport: GRPC
sources:
  csv-payment-files:
    kind: object
    provider: filesystem
    location:
      root: ../input-csv-file-processing-svc/csv
      prefix: ""
    filter:
      include: ["*.csv"]
    poll:
      enabled: true
      interval: PT10S
      batchSize: 50
    identity:
      fields: [provider, container, key, etag]
    payload:
      mode: reference
input:
  from: csv-payment-files
  emits:
    type: org.pipelineframework.csv.common.domain.CsvPaymentsInputFile
    typeName: CsvPaymentsInputFile
    mapper: org.pipelineframework.csv.common.mapper.CsvPaymentFileObjectMapper
publish:
  csv-payment-output-files:
    kind: object
    provider: filesystem
    location:
      root: ../input-csv-file-processing-svc/csv
    naming:
      keyTemplate: "{groupKey}.out"
    payload:
      contentType: text/csv
    grouping:
      maxOpenGroups: 1
output:
  to: csv-payment-output-files
  consumes:
    type: org.pipelineframework.csv.common.domain.PaymentOutput
    typeName: PaymentOutput
    mapper: org.pipelineframework.csv.common.mapper.CsvPaymentOutputPublishMapper
aspects:
  persistence:
    enabled: true
    scope: STEPS
    position: AFTER_STEP
    config:
      targetSteps:
        - ProcessCsvPaymentsInput
        - FinalizePaymentOutput
      pluginImplementationClass: org.pipelineframework.plugin.persistence.PersistenceService
      enabledTargets:
        - GRPC_SERVICE
        - CLIENT_STEP
types:
  CsvFolder:
    fields:
      - [path, path]
  CsvPaymentsInputFile:
    fields:
      - [id, uuid]
      - [filepath, path]
      - [csvFolderPath, path]
  PaymentRecord:
    fields:
      - [id, uuid]
      - [csvId, string]
      - [recipient, string]
      - [amount, decimal]
      - [currency, currency]
      - [csvPaymentsInputFilePath, path]
  ApprovedPaymentStatus:
    fields:
      - [id, uuid]
      - [reference, string]
      - [status, string]
      - [message, string]
      - [fee, decimal]
      - [conversationId, uuid]
      - [statusCode, int64]
      - [paymentRecordId, uuid]
      - [paymentRecord, PaymentRecord]
  UnapprovedPaymentStatus:
    fields:
      - [id, uuid]
      - [reference, string]
      - [status, string]
      - [message, string]
      - [fee, decimal]
      - [conversationId, uuid]
      - [statusCode, int64]
      - [paymentRecordId, uuid]
      - [paymentRecord, PaymentRecord]
  ApprovedPaymentOutput:
    fields:
      - [id, uuid]
      - [csvPaymentsOutputFilename, string]
      - [csvPaymentsInputFilePath, path]
      - [csvId, string]
      - [recipient, string]
      - [amount, decimal]
      - [currency, currency]
      - [conversationId, uuid]
      - [status, int64]
      - [message, string]
      - [fee, decimal]
  UnapprovedPaymentOutput:
    fields:
      - [id, uuid]
      - [csvPaymentsOutputFilename, string]
      - [csvPaymentsInputFilePath, path]
      - [csvId, string]
      - [recipient, string]
      - [amount, decimal]
      - [currency, currency]
      - [conversationId, uuid]
      - [status, int64]
      - [message, string]
      - [fee, decimal]
  PaymentOutput:
    fields:
      - [id, uuid]
      - [csvPaymentsOutputFilename, string]
      - [csvPaymentsInputFilePath, path]
      - [csvId, string]
      - [recipient, string]
      - [amount, decimal]
      - [currency, currency]
      - [conversationId, uuid]
      - [status, int64]
      - [message, string]
      - [fee, decimal]
  CsvPaymentsOutputFile:
    fields:
      - [id, uuid]
      - [filepath, path]
      - [csvFolderPath, path]
unions:
  PaymentStatus:
    variants:
      approved:
        type: ApprovedPaymentStatus
      unapproved:
        type: UnapprovedPaymentStatus
  PaymentOutputBranch:
    variants:
      approved:
        type: ApprovedPaymentOutput
      unapproved:
        type: UnapprovedPaymentOutput
steps:
  - name: Process Csv Payments Input
    service: org.pipelineframework.csv.service.ProcessCsvPaymentsInputService
    cardinality: EXPANSION
    input: org.pipelineframework.csv.common.domain.CsvPaymentsInputFile
    inputTypeName: CsvPaymentsInputFile
    inboundMapper: org.pipelineframework.csv.common.mapper.CsvPaymentsInputFileMapper
    output: org.pipelineframework.csv.common.domain.PaymentRecord
    outputTypeName: PaymentRecord
    outboundMapper: org.pipelineframework.csv.common.mapper.PaymentRecordMapper
  - name: Await Payment Provider
    kind: await
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.csv.common.domain.PaymentRecord
    inputTypeName: PaymentRecord
    output: org.pipelineframework.csv.common.domain.PaymentStatus
    outputTypeName: PaymentStatus
    timeout: PT5M
    idempotencyKeyFields: ["csvId", "recipient", "amount", "currency"]
    await:
      correlation:
        strategy: signedResumeToken
      transport:
        type: sqs
        request:
          queueUrl: http://localstack:4566/000000000000/csv-payment-await-requests
        response:
          queueUrl: http://localstack:4566/000000000000/csv-payment-await-results
  - name: Process Approved Payment Status
    service: org.pipelineframework.csv.service.ProcessApprovedPaymentStatusService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.csv.common.domain.ApprovedPaymentStatus
    inputTypeName: ApprovedPaymentStatus
    inboundMapper: org.pipelineframework.csv.common.mapper.ApprovedPaymentStatusMapper
    output: org.pipelineframework.csv.common.domain.ApprovedPaymentOutput
    outputTypeName: ApprovedPaymentOutput
    outboundMapper: org.pipelineframework.csv.common.mapper.ApprovedPaymentOutputMapper
  - name: Process Unapproved Payment Status
    service: org.pipelineframework.csv.service.ProcessUnapprovedPaymentStatusService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.csv.common.domain.UnapprovedPaymentStatus
    inputTypeName: UnapprovedPaymentStatus
    inboundMapper: org.pipelineframework.csv.common.mapper.UnapprovedPaymentStatusMapper
    output: org.pipelineframework.csv.common.domain.UnapprovedPaymentOutput
    outputTypeName: UnapprovedPaymentOutput
    outboundMapper: org.pipelineframework.csv.common.mapper.UnapprovedPaymentOutputMapper
  - name: Finalize Payment Output
    service: org.pipelineframework.csv.service.ProcessFinalizePaymentOutputService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.csv.common.domain.PaymentOutputBranch
    inputTypeName: PaymentOutputBranch
    inboundMapper: org.pipelineframework.csv.common.mapper.PaymentOutputBranchMapper
    accepts:
      - ApprovedPaymentOutput
      - UnapprovedPaymentOutput
    output: org.pipelineframework.csv.common.domain.PaymentOutput
    outputTypeName: PaymentOutput
    outboundMapper: org.pipelineframework.csv.common.mapper.PaymentOutputMapper
    terminal: true
