        -Dquarkus.grpc.clients.process-unapproved-payment-status.port=8183
        -Dquarkus.grpc.clients.process-unapproved-payment-status.plain-text=true
        -Dquarkus.grpc.clients.process-unapproved-payment-status.tls.enabled=false
        -Dquarkus.grpc.clients.process-unapproved-payment-status.tls-configuration-name=
