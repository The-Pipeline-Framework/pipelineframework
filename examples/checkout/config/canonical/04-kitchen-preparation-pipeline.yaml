version: 2
appName: TPFGo Kitchen Preparation Pipeline
basePackage: org.pipelineframework.tpfgo.kitchen.preparation
transport: GRPC
platform: COMPUTE
types:
  OrderAcceptedByRestaurant:
    fields:
      - [1, orderId, uuid]
      - [2, requestId, uuid]
      - [3, customerId, uuid]
      - [4, restaurantId, uuid]
      - [5, totalAmount, decimal]
      - [6, currency, string]
      - [7, acceptedAt, timestamp]
      - [8, kitchenTicketId, uuid]
  KitchenTask:
    fields:
      - [1, orderId, uuid]
      - [2, customerId, uuid]
      - [3, restaurantId, uuid]
      - [4, totalAmount, decimal]
      - [5, currency, string]
      - [6, kitchenTicketId, uuid]
      - [7, taskId, uuid]
      - [8, taskName, string]
      - [9, taskStatus, string]
  OrderReadyForDispatch:
    fields:
      - [1, orderId, uuid]
      - [2, customerId, uuid]
      - [3, restaurantId, uuid]
      - [4, totalAmount, decimal]
      - [5, currency, string]
      - [6, readyAt, timestamp]
      - [7, kitchenTicketId, uuid]
      - [8, lineageDigest, string]
steps:
  - name: Kitchen Expand Tasks
    service: org.pipelineframework.tpfgo.kitchen.preparation.kitchen_expand_tasks.service.ProcessKitchenExpandTasksService
    cardinality: ONE_TO_MANY
    input: org.pipelineframework.tpfgo.common.domain.OrderAcceptedByRestaurant
    inputTypeName: OrderAcceptedByRestaurant
    inboundMapper: org.pipelineframework.tpfgo.kitchen.preparation.kitchen_expand_tasks.service.OrderAcceptedByRestaurantMapper
    output: org.pipelineframework.tpfgo.common.domain.KitchenTask
    outputTypeName: KitchenTask
    outboundMapper: org.pipelineframework.tpfgo.kitchen.preparation.kitchen_expand_tasks.service.KitchenTaskMapper
  - name: Kitchen Reduce Completion
    service: org.pipelineframework.tpfgo.kitchen.preparation.kitchen_reduce_completion.service.ProcessKitchenReduceCompletionService
    cardinality: MANY_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.KitchenTask
    inputTypeName: KitchenTask
    inboundMapper: org.pipelineframework.tpfgo.kitchen.preparation.kitchen_expand_tasks.service.KitchenTaskMapper
    output: org.pipelineframework.tpfgo.common.domain.OrderReadyForDispatch
    outputTypeName: OrderReadyForDispatch
    outboundMapper: org.pipelineframework.tpfgo.kitchen.preparation.kitchen_reduce_completion.service.OrderReadyForDispatchMapper
input:
  subscription:
    publication: tpfgo.restaurant.order-accepted.v1
output:
  checkpoint:
    publication: tpfgo.kitchen.order-ready.v1
    idempotencyKeyFields:
      - orderId
