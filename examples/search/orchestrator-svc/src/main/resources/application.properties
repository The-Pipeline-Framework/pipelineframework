%dev.quarkus.http.ssl-port=8443
%test.quarkus.http.ssl-port=8443
%lambda.quarkus.lambda.handler=PipelineRunFunctionHandler
%lambda.quarkus.http.ssl.certificate.key-store-file=${SERVER_KEYSTORE_PATH:/var/task/server-keystore.jks}
%lambda.pipeline.client.tls-configuration-name=pipeline-client
%lambda.quarkus.tls.pipeline-client.trust-store.jks.path=${CLIENT_TRUSTSTORE_PATH:/var/task/client-truststore.jks}
%lambda.quarkus.tls.pipeline-client.trust-store.jks.password=secret
%lambda.pipeline.cache.provider=memory
%lambda.quarkus.otel.enabled=false
%lambda.quarkus.micrometer.export.prometheus.enabled=false
# The modular AWS example runs behind Function URLs, so AWS terminates HTTPS upstream.
%lambda-modular.quarkus.grpc.server.plain-text=true
%lambda-modular.quarkus.http.insecure-requests=enabled
# The first modular AWS slice keeps cache state in-memory to avoid extra infrastructure.
%lambda-modular.pipeline.cache.provider=memory
%lambda-modular.pipeline.client.tls-configuration-name=
# Use CloudWatch and Lambda metrics for this manual workflow instead of in-process exporters.
%lambda-modular.quarkus.otel.enabled=false
%lambda-modular.quarkus.micrometer.export.prometheus.enabled=false

# Vert.x configuration
%dev.quarkus.grpc.server.use-separate-server=false
%test.quarkus.grpc.server.use-separate-server=false
%dev.quarkus.grpc.server.plain-text=false
%test.quarkus.grpc.server.plain-text=false
%dev.quarkus.http.ssl.certificate.key-store-file=${SERVER_KEYSTORE_PATH:../target/dev-certs/orchestrator-svc/server-keystore.jks}
%test.quarkus.http.ssl.certificate.key-store-file=${SERVER_KEYSTORE_PATH:../target/dev-certs/orchestrator-svc/server-keystore.jks}
%dev.quarkus.http.ssl.certificate.key-store-password=secret
%test.quarkus.http.ssl.certificate.key-store-password=secret
%dev.quarkus.http.insecure-requests=disabled
%test.quarkus.http.insecure-requests=disabled
quarkus.http.enable-compression=true
quarkus.rest-client.http2=true

# Pipeline Configuration
pipeline.defaults.retry-limit=10
pipeline.defaults.retry-wait-ms=500
pipeline.defaults.recover-on-failure=false
pipeline.defaults.max-backoff=30000
pipeline.defaults.jitter=false

pipeline.cache.policy=prefer-cache
pipeline.cache.provider=redis
%prod.quarkus.redis.hosts=${REDIS_HOSTS}
%dev.quarkus.redis.devservices.enabled=true
%test.quarkus.redis.devservices.enabled=true

# Client wiring defaults (endpoints generated by the annotation processor)
%dev.pipeline.client.tls-configuration-name=pipeline-client
%test.pipeline.client.tls-configuration-name=pipeline-client

# TLS configuration
%dev.quarkus.tls.pipeline-client.trust-store.jks.path=${CLIENT_TRUSTSTORE_PATH:../target/dev-certs/orchestrator-svc/client-truststore.jks}
%test.quarkus.tls.pipeline-client.trust-store.jks.path=${CLIENT_TRUSTSTORE_PATH:../target/dev-certs/orchestrator-svc/client-truststore.jks}
%dev.quarkus.tls.pipeline-client.trust-store.jks.password=secret
%test.quarkus.tls.pipeline-client.trust-store.jks.password=secret

# Micrometer configuration
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=${QUARKUS_OTEL_METRICS_ENABLED:${QUARKUS_MICROMETER_EXPORT_PROMETHEUS_ENABLED:true}}
quarkus.micrometer.binder.http-client.enabled=${QUARKUS_OTEL_METRICS_ENABLED:${QUARKUS_MICROMETER_EXPORT_PROMETHEUS_ENABLED:true}}

# OpenTelemetry configuration
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://otel-collector:4317
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.traces.enabled=true
quarkus.otel.metrics.enabled=true
quarkus.otel.logs.enabled=true

# Docker image
quarkus.container-image.builder=jib
quarkus.container-image.registry=localhost
quarkus.container-image.group=search-pipeline
quarkus.container-image.name=orchestrator-svc
quarkus.container-image.tag=latest
