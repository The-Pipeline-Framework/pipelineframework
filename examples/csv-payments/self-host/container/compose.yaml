name: csv-payments-self-host-ha

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "${TPF_LOCALSTACK_PORT:-4567}:4566"
    environment:
      SERVICES: dynamodb,sqs,s3
      AWS_DEFAULT_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_ENDPOINT_STRATEGY: path
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 30

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: quarkus
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d quarkus"]
      interval: 5s
      timeout: 5s
      retries: 30

  persistence:
    image: "${TPF_CSV_PERSISTENCE_IMAGE:-localhost/csv-payments/persistence-svc:latest}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${TPF_PERSISTENCE_PORT:-8282}:8282"
    volumes:
      - "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}:${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}"
    environment:
      PG_URL: postgresql://postgres:5432/quarkus
      PG_USER: test
      PG_PASSWORD: test
      SERVER_KEYSTORE_PATH: "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}/examples/csv-payments/target/dev-certs/persistence-svc/server-keystore.jks"
      # Local/demo only: drop-and-create destroys persistence data on restart.
      # Use a non-destructive schema strategy outside this throwaway stack.
      JAVA_OPTS_APPEND: >-
        --enable-preview
        -Dquarkus.http.host=0.0.0.0
        -Dquarkus.http.port=8282
        -Dquarkus.http.ssl-port=0
        -Dquarkus.http.insecure-requests=enabled
        -Dquarkus.grpc.server.use-separate-server=false
        -Dquarkus.grpc.server.plain-text=true
        -Dquarkus.hibernate-orm.schema-management.strategy=drop-and-create
        -Dquarkus.otel.enabled=false
        -Dquarkus.otel.sdk.disabled=true
        -Dquarkus.micrometer.export.prometheus.enabled=false
        -Dquarkus.micrometer.binder.http-server.enabled=false
        -Dquarkus.micrometer.binder.http-client.enabled=false

  runtime:
    image: "${TPF_CSV_RUNTIME_IMAGE:-localhost/csv-payments/pipeline-runtime-svc:latest}"
    depends_on:
      localstack:
        condition: service_healthy
      persistence:
        condition: service_started
    ports:
      - "${TPF_RUNTIME_PORT:-8283}:8183"
    volumes:
      - "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}:${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      PIPELINE_CONFIG: "${TPF_CSV_PIPELINE_CONFIG:-${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}/examples/csv-payments/config/pipeline.container-sqs.yaml}"
      PIPELINE_OBJECT_INGEST_AUTOSTART: "false"
      SERVER_KEYSTORE_PATH: "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}/examples/csv-payments/target/dev-certs/pipeline-runtime-svc/server-keystore.jks"
      SERVER_KEYSTORE_PASSWORD: secret
      SERVER_TRUSTSTORE_PATH: "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}/examples/csv-payments/target/dev-certs/pipeline-runtime-svc/client-truststore.jks"
      SERVER_TRUSTSTORE_PASSWORD: secret
      CLIENT_TRUSTSTORE_PATH: "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}/examples/csv-payments/target/dev-certs/pipeline-runtime-svc/client-truststore.jks"
      CLIENT_TRUSTSTORE_PASSWORD: secret
      JAVA_OPTS_APPEND: >-
        --enable-preview
        -Dquarkus.http.host=0.0.0.0
        -Dquarkus.http.port=8183
        -Dquarkus.http.ssl-port=0
        -Dquarkus.http.insecure-requests=enabled
        -Dquarkus.grpc.server.use-separate-server=false
        -Dquarkus.grpc.server.plain-text=true
        -Dpipeline.client.tls-configuration-name=
        -Dquarkus.otel.enabled=false
        -Dquarkus.otel.sdk.disabled=true
        -Dquarkus.micrometer.export.prometheus.enabled=false
        -Dquarkus.micrometer.binder.http-server.enabled=false
        -Dquarkus.micrometer.binder.http-client.enabled=false
        -Dpipeline.orchestrator.mode=QUEUE_ASYNC
        -Dpipeline.orchestrator.resume-token-secret=csv-payments-container-resume-token-secret
        -Dpipeline.orchestrator.strict-startup=false
        -Dpipeline.await-admission.enabled=true
        -Dpipeline.await-admission.store=dynamo
        -Dpipeline.orchestrator.dynamo.region=${AWS_REGION:-us-east-1}
        -Dpipeline.orchestrator.dynamo.endpoint-override=http://localstack:4566
        -Dpipeline.orchestrator.dynamo.await-admission-table=tpf_await_admission
        -Dkafka.bootstrap.servers=${TPF_KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
        -Dtpf.await.kafka.reactive-messaging.enabled=${TPF_RUNTIME_AWAIT_KAFKA_ENABLED:-false}
        -Dmp.messaging.outgoing.tpf-await-kafka-requests.enabled=${TPF_RUNTIME_AWAIT_KAFKA_ENABLED:-false}
        ${TPF_RUNTIME_AWAIT_KAFKA_RESPONSE_OPTS:-}
        -Dmp.messaging.incoming.csv-payment-provider-requests.enabled=${TPF_RUNTIME_KAFKA_PROVIDER_ENABLED:-false}
        -Dmp.messaging.outgoing.csv-payment-provider-results.enabled=${TPF_RUNTIME_KAFKA_PROVIDER_ENABLED:-false}
        -Dcsv-payments.payment-provider.sqs.enabled=${TPF_RUNTIME_AWAIT_SQS_PROVIDER_ENABLED:-true}
        -Dcsv-payments.payment-provider.sqs.request-queue-url=http://localstack:4566/000000000000/csv-payment-await-requests
        -Dcsv-payments.payment-provider.sqs.response-queue-url=http://localstack:4566/000000000000/csv-payment-await-results
        -Dcsv-payments.payment-provider.sqs.region=${AWS_REGION:-us-east-1}
        -Dcsv-payments.payment-provider.sqs.endpoint-override=http://localstack:4566
        -Dcsv-payments.payment-provider.permits-per-second=250.0
        -Dcsv-payments.payment-provider.timeout-millis=5000
        -Dcsv-payments.payment-provider.response-delay-millis=3000
        -Dquarkus.grpc.clients.process-csv-payments-input.host=localhost
        -Dquarkus.grpc.clients.process-csv-payments-input.port=8183
        -Dquarkus.grpc.clients.process-csv-payments-input.plain-text=true
        -Dquarkus.grpc.clients.process-approved-payment-status.host=localhost
        -Dquarkus.grpc.clients.process-approved-payment-status.port=8183
        -Dquarkus.grpc.clients.process-approved-payment-status.plain-text=true
        -Dquarkus.grpc.clients.process-unapproved-payment-status.host=localhost
        -Dquarkus.grpc.clients.process-unapproved-payment-status.port=8183
        -Dquarkus.grpc.clients.process-unapproved-payment-status.plain-text=true
        -Dquarkus.grpc.clients.process-finalize-payment-output.host=localhost
        -Dquarkus.grpc.clients.process-finalize-payment-output.port=8183
        -Dquarkus.grpc.clients.process-finalize-payment-output.plain-text=true

  worker:
    image: "${TPF_CSV_WORKER_IMAGE:-localhost/csv-payments/orchestrator-svc:latest}"
    depends_on:
      localstack:
        condition: service_healthy
      runtime:
        condition: service_started
      persistence:
        condition: service_started
    ports:
      - "${TPF_WORKER_PORT:-8182}:8182"
    volumes:
      - "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}:${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      TPF_WORKER_SECRET: "${TPF_WORKER_SECRET:-csv-transition-worker-secret}"
      PIPELINE_CONFIG: "${TPF_CSV_PIPELINE_CONFIG:-${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}/examples/csv-payments/config/pipeline.container-sqs.yaml}"
      PIPELINE_OBJECT_INGEST_AUTOSTART: "false"
      SERVER_KEYSTORE_PATH: "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}/examples/csv-payments/target/dev-certs/orchestrator-svc/server-keystore.jks"
      SERVER_KEYSTORE_PASSWORD: secret
      SERVER_TRUSTSTORE_PATH: "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}/examples/csv-payments/target/dev-certs/orchestrator-svc/client-truststore.jks"
      SERVER_TRUSTSTORE_PASSWORD: secret
      CLIENT_TRUSTSTORE_PATH: "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}/examples/csv-payments/target/dev-certs/orchestrator-svc/client-truststore.jks"
      CLIENT_TRUSTSTORE_PASSWORD: secret
      JAVA_OPTS_APPEND: >-
        --enable-preview
        -Dquarkus.http.host=0.0.0.0
        -Dquarkus.http.port=8182
        -Dquarkus.http.ssl-port=0
        -Dquarkus.http.insecure-requests=enabled
        -Dquarkus.grpc.server.use-separate-server=false
        -Dquarkus.grpc.server.plain-text=true
        -Dpipeline.client.tls-configuration-name=
        -Dquarkus.otel.enabled=false
        -Dquarkus.otel.sdk.disabled=true
        -Dquarkus.micrometer.export.prometheus.enabled=false
        -Dquarkus.micrometer.binder.http-server.enabled=false
        -Dquarkus.micrometer.binder.http-client.enabled=false
        -Dpipeline.orchestrator.mode=QUEUE_ASYNC
        -Dpipeline.orchestrator.resume-token-secret=csv-payments-container-resume-token-secret
        -Dpipeline.orchestrator.worker.rest.server-enabled=true
        -Dpipeline.orchestrator.worker.rest.shared-secret-ref=env:TPF_WORKER_SECRET
        -Dpipeline.orchestrator.strict-startup=false
        -Dkafka.bootstrap.servers=${TPF_KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
        -Dtpf.await.kafka.reactive-messaging.enabled=${TPF_WORKER_AWAIT_KAFKA_ENABLED:-false}
        -Dmp.messaging.outgoing.tpf-await-kafka-requests.enabled=${TPF_WORKER_AWAIT_KAFKA_ENABLED:-false}
        -Dmp.messaging.incoming.tpf-await-kafka-responses.enabled=${TPF_WORKER_AWAIT_KAFKA_ENABLED:-false}
        -Dpipeline.orchestrator.sqs.region=${AWS_REGION:-us-east-1}
        -Dpipeline.orchestrator.sqs.endpoint-override=http://localstack:4566
        -Dpipeline.orchestrator.state-provider=dynamo
        -Dpipeline.orchestrator.dynamo.region=${AWS_REGION:-us-east-1}
        -Dpipeline.orchestrator.dynamo.endpoint-override=http://localstack:4566
        -Dpipeline.orchestrator.dynamo.execution-table=tpf_execution
        -Dpipeline.orchestrator.dynamo.execution-key-table=tpf_execution_key
        -Dpipeline.orchestrator.dynamo.await-unit-table=tpf_await_unit
        -Dpipeline.orchestrator.dynamo.await-interaction-table=tpf_await_interaction
        -Dpipeline.orchestrator.dynamo.await-interaction-key-table=tpf_await_interaction_key
        -Dpipeline.await-admission.enabled=true
        -Dpipeline.await-admission.store=dynamo
        -Dpipeline.orchestrator.dynamo.await-admission-table=tpf_await_admission
        -Dpipeline.health.enabled=false
        -Dquarkus.grpc.clients.process-csv-payments-input.host=runtime
        -Dquarkus.grpc.clients.process-csv-payments-input.port=8183
        -Dquarkus.grpc.clients.process-csv-payments-input.plain-text=true
        -Dquarkus.grpc.clients.process-csv-payments-input.tls.enabled=false
        -Dquarkus.grpc.clients.process-csv-payments-input.tls-configuration-name=
        -Dquarkus.grpc.clients.process-approved-payment-status.host=runtime
        -Dquarkus.grpc.clients.process-approved-payment-status.port=8183
        -Dquarkus.grpc.clients.process-approved-payment-status.plain-text=true
        -Dquarkus.grpc.clients.process-approved-payment-status.tls.enabled=false
        -Dquarkus.grpc.clients.process-approved-payment-status.tls-configuration-name=
        -Dquarkus.grpc.clients.process-unapproved-payment-status.host=runtime
        -Dquarkus.grpc.clients.process-unapproved-payment-status.port=8183
        -Dquarkus.grpc.clients.process-unapproved-payment-status.plain-text=true
        -Dquarkus.grpc.clients.process-unapproved-payment-status.tls.enabled=false
        -Dquarkus.grpc.clients.process-unapproved-payment-status.tls-configuration-name=
        -Dquarkus.grpc.clients.process-finalize-payment-output.host=runtime
        -Dquarkus.grpc.clients.process-finalize-payment-output.port=8183
        -Dquarkus.grpc.clients.process-finalize-payment-output.plain-text=true
        -Dquarkus.grpc.clients.process-finalize-payment-output.tls.enabled=false
        -Dquarkus.grpc.clients.process-finalize-payment-output.tls-configuration-name=
        -Dquarkus.grpc.clients.observe-persistence-csv-payments-input-file-side-effect.host=persistence
        -Dquarkus.grpc.clients.observe-persistence-csv-payments-input-file-side-effect.port=8282
        -Dquarkus.grpc.clients.observe-persistence-csv-payments-input-file-side-effect.plain-text=true
        -Dquarkus.grpc.clients.observe-persistence-csv-payments-input-file-side-effect.tls.enabled=false
        -Dquarkus.grpc.clients.observe-persistence-csv-payments-input-file-side-effect.tls-configuration-name=
        -Dquarkus.grpc.clients.observe-persistence-payment-record-side-effect.host=persistence
        -Dquarkus.grpc.clients.observe-persistence-payment-record-side-effect.port=8282
        -Dquarkus.grpc.clients.observe-persistence-payment-record-side-effect.plain-text=true
        -Dquarkus.grpc.clients.observe-persistence-payment-record-side-effect.tls.enabled=false
        -Dquarkus.grpc.clients.observe-persistence-payment-record-side-effect.tls-configuration-name=
        -Dquarkus.grpc.clients.observe-persistence-payment-status-side-effect.host=persistence
        -Dquarkus.grpc.clients.observe-persistence-payment-status-side-effect.port=8282
        -Dquarkus.grpc.clients.observe-persistence-payment-status-side-effect.plain-text=true
        -Dquarkus.grpc.clients.observe-persistence-payment-status-side-effect.tls.enabled=false
        -Dquarkus.grpc.clients.observe-persistence-payment-status-side-effect.tls-configuration-name=
        -Dquarkus.grpc.clients.observe-persistence-csv-payments-output-file-side-effect.host=persistence
        -Dquarkus.grpc.clients.observe-persistence-csv-payments-output-file-side-effect.port=8282
        -Dquarkus.grpc.clients.observe-persistence-csv-payments-output-file-side-effect.plain-text=true
        -Dquarkus.grpc.clients.observe-persistence-csv-payments-output-file-side-effect.tls.enabled=false
        -Dquarkus.grpc.clients.observe-persistence-csv-payments-output-file-side-effect.tls-configuration-name=
        -Dquarkus.grpc.clients.observe-persistence-payment-output-side-effect.host=persistence
        -Dquarkus.grpc.clients.observe-persistence-payment-output-side-effect.port=8282
        -Dquarkus.grpc.clients.observe-persistence-payment-output-side-effect.plain-text=true
        -Dquarkus.grpc.clients.observe-persistence-payment-output-side-effect.tls.enabled=false
        -Dquarkus.grpc.clients.observe-persistence-payment-output-side-effect.tls-configuration-name=

  coordinator:
    image: "${TPF_CSV_COORDINATOR_IMAGE:-localhost/csv-payments/orchestrator-svc:latest}"
    depends_on:
      localstack:
        condition: service_healthy
      worker:
        condition: service_started
    ports:
      - "${TPF_COORDINATOR_PORT:-8082}:8082"
    volumes:
      - "${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}:${TPF_REPO_ROOT:?TPF_REPO_ROOT must be set}"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      TPF_CONTROL_PLANE_TOKEN: "${TPF_CONTROL_PLANE_TOKEN:-csv-control-plane-admin-token}"
      TPF_ADMIN_TOKEN: "${TPF_ADMIN_TOKEN:-csv-control-plane-admin-token}"
      TPF_WORKER_SECRET: "${TPF_WORKER_SECRET:-csv-transition-worker-secret}"
