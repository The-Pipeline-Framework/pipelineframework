name: Reusable — Checkout FTGo QUEUE_ASYNC Durable HA

on:
  workflow_call:
    inputs:
      artifact_name:
        description: "Name of the Maven artifacts tarball"
        required: false
        default: "framework-m2-cache"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-e2e-checkout-ftgo-queue-async-ha
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xmx2g -Xms512m
  MAVEN_ARGS_BUILD: -B -T 1 -V -Dmaven.test.redirectTestOutputToFile=true -Dsurefire.parallel=none -Dfailsafe.parallel=none

jobs:
  checkout-ftgo-queue-async-ha:
    name: Checkout FTGo QUEUE_ASYNC Durable HA
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Maven
        run: echo "MAVEN_ARGS=${{ env.MAVEN_ARGS_BUILD }} --no-transfer-progress" >> $GITHUB_ENV

      - name: Download framework artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: /tmp/m2-artifacts

      - name: Extract framework artifacts
        run: |
          mkdir -p ~/.m2/repository
          artifact="/tmp/m2-artifacts/${{ inputs.artifact_name }}.tar.gz"
          if [ ! -r "$artifact" ]; then
            echo "::error::Missing or unreadable framework artifact tarball: $artifact"
            exit 1
          fi
          if ! tar -tzf "$artifact" >/dev/null; then
            echo "::error::Invalid framework artifact tarball: $artifact"
            exit 1
          fi
          tar -xzf "$artifact" -C ~/.m2/repository

      - name: Package checkout deliver-order orchestrator
        run: |
          read -r -a maven_args <<< "$MAVEN_ARGS"
          ./mvnw "${maven_args[@]}" -f examples/checkout/deliver-order-orchestrator-svc/pom.xml \
            -DskipTests \
            package

      - name: Run checkout durable QUEUE_ASYNC HA chaos lane
        run: |
          read -r -a maven_args <<< "$MAVEN_ARGS"
          ./mvnw "${maven_args[@]}" -f examples/checkout/deliver-order-orchestrator-svc/pom.xml \
            -Dit.test=QueueAsyncDurableHaIT \
            failsafe:integration-test \
            failsafe:verify

      - name: Dump durable HA diagnostics on failure
        if: failure()
        run: |
          find examples/checkout/deliver-order-orchestrator-svc/target/failsafe-reports -maxdepth 2 -type f -print -exec tail -n 200 {} \;
          find examples/checkout/deliver-order-orchestrator-svc/target/failsafe-reports/queue-async-ha -type f -print -exec tail -n 200 {} \;

      - name: Upload durable HA diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkout-ftgo-queue-async-ha-diagnostics
          path: |
            examples/checkout/deliver-order-orchestrator-svc/target/failsafe-reports/**
            examples/checkout/deliver-order-orchestrator-svc/target/surefire-reports/**
          retention-days: 7
          if-no-files-found: warn
