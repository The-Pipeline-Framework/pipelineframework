name: Spring Smoke

on:
  pull_request:
    paths:
      - 'framework/**'
      - 'examples/spring-smoke-tests/**'
      - '.github/workflows/spring-smoke.yml'
  push:
    branches: [main]
    paths:
      - 'framework/**'
      - 'examples/spring-smoke-tests/**'
      - '.github/workflows/spring-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spring-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install framework artifacts
        run: |
          ./mvnw -N install -DskipTests -Dgpg.skip
          ./mvnw -f framework/pom.xml install -DskipTests -Dgpg.skip

      - name: Run Spring smoke tests
        run: ./mvnw -f examples/spring-smoke-tests/pom.xml clean verify -DskipNative=true -Dquarkus.container-image.build=false
