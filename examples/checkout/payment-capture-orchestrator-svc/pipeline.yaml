version: 2
appName: TPFGo Payment Capture Pipeline
basePackage: org.pipelineframework.tpfgo.payment.capture
transport: GRPC
platform: COMPUTE
types:
  OrderDelivered:
    fields:
      - [1, orderId, uuid]
      - [2, customerId, uuid]
      - [3, dispatchId, uuid]
      - [4, courierId, uuid]
      - [5, restaurantId, uuid]
      - [6, kitchenTicketId, uuid]
      - [7, deliveredAt, timestamp]
      - [8, amount, decimal]
      - [9, currency, string]
      - [10, lineageDigest, string]
  PaymentCaptured:
    fields:
      - [1, orderId, uuid]
      - [2, paymentId, uuid]
      - [3, processedAt, timestamp]
      - [4, amount, decimal]
      - [5, currency, string]
  PaymentRejected:
    fields:
      - [1, orderId, uuid]
      - [2, processedAt, timestamp]
      - [3, amount, decimal]
      - [4, currency, string]
      - [5, failureCode, string]
      - [6, failureReason, string]
  PaymentRequiresReview:
    fields:
      - [1, orderId, uuid]
      - [2, processedAt, timestamp]
      - [3, amount, decimal]
      - [4, currency, string]
      - [5, reviewReason, string]
unions:
  PaymentOutcome:
    variants:
      captured:
        type: PaymentCaptured
        number: 1
      rejected:
        type: PaymentRejected
        number: 2
      requiresReview:
        type: PaymentRequiresReview
        number: 3
steps:
  - name: Payment Capture Order
    service: org.pipelineframework.tpfgo.payment.capture.payment_capture_order.service.ProcessPaymentCaptureOrderService
    cardinality: ONE_TO_ONE
    input: org.pipelineframework.tpfgo.common.domain.OrderDelivered
    inputTypeName: OrderDelivered
    inboundMapper: org.pipelineframework.tpfgo.payment.capture.payment_capture_order.service.OrderDeliveredMapper
    output: org.pipelineframework.tpfgo.common.domain.PaymentOutcome
    outputTypeName: PaymentOutcome
input:
  subscription:
    publication: tpfgo.delivery.order-delivered.v1
    mapper: org.pipelineframework.tpfgo.payment.capture.payment_capture_order.service.OrderDeliveredMapper
output:
  checkpoint:
    publication: tpfgo.payment.capture-result.v1
    idempotencyKeyFields:
      - orderId
