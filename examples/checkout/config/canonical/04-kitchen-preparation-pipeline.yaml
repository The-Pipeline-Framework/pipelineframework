appName: "FTGo Kitchen Preparation Pipeline"
basePackage: "org.pipelineframework.checkout.ftgo.kitchen"
transport: "GRPC"
steps:
  - name: "Kitchen Expand Tasks"
    cardinality: "ONE_TO_MANY"
    inputTypeName: "OrderAcceptedByRestaurant"
    inputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "customerId"
        type: "UUID"
        protoType: "string"
      - name: "restaurantId"
        type: "UUID"
        protoType: "string"
      - name: "totalAmount"
        type: "BigDecimal"
        protoType: "string"
      - name: "currency"
        type: "String"
        protoType: "string"
      - name: "acceptedAt"
        type: "Instant"
        protoType: "string"
      - name: "kitchenTicketId"
        type: "UUID"
        protoType: "string"
    outputTypeName: "KitchenTask"
    outputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "kitchenTicketId"
        type: "UUID"
        protoType: "string"
      - name: "taskId"
        type: "UUID"
        protoType: "string"
      - name: "taskName"
        type: "String"
        protoType: "string"
      - name: "taskStatus"
        type: "String"
        protoType: "string"
  - name: "Kitchen Reduce Completion"
    cardinality: "MANY_TO_ONE"
    inputTypeName: "KitchenTask"
    inputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "kitchenTicketId"
        type: "UUID"
        protoType: "string"
      - name: "taskId"
        type: "UUID"
        protoType: "string"
      - name: "taskName"
        type: "String"
        protoType: "string"
      - name: "taskStatus"
        type: "String"
        protoType: "string"
    outputTypeName: "OrderReadyForDispatch"
    outputFields:
      - name: "orderId"
        type: "UUID"
        protoType: "string"
      - name: "customerId"
        type: "UUID"
        protoType: "string"
      - name: "restaurantId"
        type: "UUID"
        protoType: "string"
      - name: "readyAt"
        type: "Instant"
        protoType: "string"
      - name: "kitchenTicketId"
        type: "UUID"
        protoType: "string"
      - name: "lineageDigest"
        type: "String"
        protoType: "string"
